<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>逻辑思维训练题库 · 200题</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;background:#f2f3f7;min-height:100vh;color:#1a1a1a}
.app{max-width:680px;margin:0 auto;padding:12px 10px 32px}

/* 头部 */
.header{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.title{font-size:16px;font-weight:600;color:#111}
.stats{display:flex;gap:14px}
.stat{text-align:center}
.stat-n{font-size:20px;font-weight:600;color:#1a1a1a;line-height:1.2}
.stat-n.green{color:#22a55b}
.stat-l{font-size:11px;color:#999;margin-top:1px}
.progress-bar{height:5px;background:#eee;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#4a90d9,#1d9e75);border-radius:3px;transition:width .4s}

/* 筛选 */
.filter-block{background:#fff;border-radius:12px;padding:10px 12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-size:11px;color:#999;margin-bottom:4px}
.fbtn{font-size:12px;padding:5px 11px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#555;cursor:pointer;transition:all .15s;white-space:nowrap;outline:none}
.fbtn.on{background:#4a90d9;border-color:#4a90d9;color:#fff}
.fbtn.on-green{background:#22a55b;border-color:#22a55b;color:#fff}
.fbtn.on-red{background:#e05252;border-color:#e05252;color:#fff}

/* 跳转 */
.jump-row{display:flex;gap:8px;margin-bottom:10px}
.jump-row input{flex:1;padding:9px 12px;border:1px solid #ddd;border-radius:10px;font-size:14px;background:#fff;color:#1a1a1a;outline:none}
.jump-row input:focus{border-color:#4a90d9}
.jump-btn{padding:9px 16px;border:none;border-radius:10px;background:#4a90d9;color:#fff;font-size:14px;cursor:pointer;white-space:nowrap;font-weight:500}

/* 题卡 */
.card{background:#fff;border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);border:2px solid transparent;transition:border-color .25s}
.card.ok{border-color:#22a55b}
.card.ng{border-color:#e05252}
.card-head{padding:13px 14px 11px}
.meta{display:flex;gap:5px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
.qnum{font-size:12px;color:#888;font-weight:500}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.ba{background:#e8f1fb;color:#2a6cb0}
.bb{background:#fef3dc;color:#9a6500}
.bc{background:#e6f7ed;color:#1e7a46}
.bs{background:#eeeafc;color:#5540aa}
.lv1{background:#f5f5f5;color:#666}
.lv2{background:#fef3dc;color:#9a6500}
.lv3{background:#fde8e8;color:#a83232}
.qtype-tag{font-size:11px;color:#bbb}
.stem{font-size:14.5px;line-height:1.7;color:#222;white-space:pre-line}
.card-body{padding:10px 14px 13px}

/* 选项 */
.opts{display:flex;flex-direction:column;gap:7px}
.opt{width:100%;font-size:14px;padding:10px 13px;border:1.5px solid #e5e5e5;border-radius:10px;cursor:pointer;color:#222;background:#fff;text-align:left;transition:all .15s;line-height:1.5;outline:none}
.opt:active{background:#f5f5f5}
.opt.correct{background:#e6f7ed;border-color:#22a55b;color:#155f33}
.opt.wrong{background:#fde8e8;border-color:#e05252;color:#8b1c1c}
.opt.show-ans{background:#e6f7ed;border-color:#22a55b;color:#155f33}
.opt.disabled{cursor:default;pointer-events:none}

/* 判断按钮 */
.jbtns{display:flex;gap:8px}
.jbtn{flex:1;padding:11px;border:1.5px solid #e5e5e5;border-radius:10px;font-size:15px;cursor:pointer;background:#fff;color:#333;font-weight:500;transition:all .15s;outline:none}
.jbtn:active{background:#f5f5f5}
.jbtn.correct{background:#e6f7ed;border-color:#22a55b;color:#155f33}
.jbtn.wrong{background:#fde8e8;border-color:#e05252;color:#8b1c1c}
.jbtn.show-ans{background:#e6f7ed;border-color:#22a55b;color:#155f33}
.jbtn.disabled{cursor:default;pointer-events:none}

/* 解析 */
.analysis{margin-top:10px;padding:10px 12px;background:#f0f6ff;border-radius:10px;font-size:13.5px;line-height:1.7;color:#2a4a7f;border-left:3px solid #4a90d9;display:none}
.analysis.show{display:block}
.tag-badge{display:inline-block;font-size:11px;background:#dde9f8;color:#2a6cb0;padding:2px 8px;border-radius:8px;margin-bottom:6px;font-weight:500}

/* 结果标记 */
.result-mark{display:inline-block;font-size:12px;font-weight:600;margin-left:6px;padding:2px 7px;border-radius:8px}
.rm-ok{background:#e6f7ed;color:#22a55b}
.rm-ng{background:#fde8e8;color:#e05252}

/* 空状态 */
.empty{text-align:center;padding:50px 20px;color:#aaa;font-size:15px}
.empty span{font-size:36px;display:block;margin-bottom:12px}

/* 底部 */
.reset-btn{width:100%;padding:12px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:14px;background:#fff;color:#999;cursor:pointer;margin-top:4px}
.reset-btn:active{background:#f8f8f8}

/* 顶部吸附 */
.sticky-top{position:sticky;top:0;z-index:10;padding-top:10px;background:#f2f3f7}
</style>
</head>
<body>
<div class="app">

<div class="sticky-top">
<div class="header">
  <div class="header-top">
    <div class="title">逻辑思维训练题库</div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">已做</div></div>
      <div class="stat"><div class="stat-n green" id="s-right">0</div><div class="stat-l">正确</div></div>
      <div class="stat"><div class="stat-n" id="s-total">200</div><div class="stat-l">共计</div></div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
</div>
</div>

<div class="filter-block">
  <div class="filter-label">题型分类</div>
  <div class="filter-row" id="fc">
    <button class="fbtn on" onclick="setCat(this,'all')">全部</button>
    <button class="fbtn" onclick="setCat(this,'A')">A 论证结构</button>
    <button class="fbtn" onclick="setCat(this,'B')">B 谬误识别</button>
    <button class="fbtn" onclick="setCat(this,'C')">C 概念把握</button>
    <button class="fbtn" onclick="setCat(this,'综合')">综合</button>
  </div>
  <div class="filter-label" style="margin-top:8px">难度</div>
  <div class="filter-row" id="fl">
    <button class="fbtn on" onclick="setLv(this,'all')">全部难度</button>
    <button class="fbtn" onclick="setLv(this,1)">基础</button>
    <button class="fbtn" onclick="setLv(this,2)">进阶</button>
    <button class="fbtn" onclick="setLv(this,3)">挑战</button>
  </div>
  <div class="filter-label" style="margin-top:8px">状态</div>
  <div class="filter-row" id="fd">
    <button class="fbtn on" onclick="setDone(this,'all')">全部</button>
    <button class="fbtn" onclick="setDone(this,'undone')">未做</button>
    <button class="fbtn on-red" style="display:none" onclick="setDone(this,'wrong')" id="btn-wrong">答错 (<span id="wrong-count">0</span>)</button>
  </div>
</div>

<div class="jump-row">
  <input type="number" id="ji" placeholder="跳到第几题 (1-200)" min="1" max="200">
  <button class="jump-btn" onclick="jumpTo()">跳转</button>
</div>

<div id="list"></div>
<button class="reset-btn" onclick="resetAll()">🗑 清除所有作答记录，重新开始</button>
</div>

<script>
const Q=[
{id:1,cat:'A',lv:1,type:'judge',stem:'【论据与论点】\n某文章论点是"深耕有助于花树根系发育"，论据是"花树发达与否，全靠乎根，倘使种植时仅掘至应种之下而止，则根须不易发展"。\n\n判断：该论据直接支撑了上述论点。',ans:'正确',tag:'论据→论点识别',analysis:'论据从"根须发展依赖足够深度"正面推出"深耕有利根系"，逻辑链完整，支撑有效。'},
{id:2,cat:'A',lv:1,type:'judge',stem:'【论据与论点】\n某文章论点是"浅种是为了保证植物呼吸"，论据是"人苟闭塞口鼻，必致窒息，使花与树之枝干深陷土内，亦必致窒息"。\n\n判断：该论据通过类比论证支撑了论点。',ans:'正确',tag:'类比论证识别',analysis:'以人闭塞口鼻类比植物枝干深埋，论据通过类比推理有效支撑论点。'},
{id:3,cat:'A',lv:1,type:'judge',stem:'【论据与论点】\n某文章论点是"晴天种植优于雨天"，论据是"炎夏烈日之下种植固非所宜"。\n\n判断：该论据有效支撑了论点。',ans:'错误',tag:'论据与论点不符',analysis:'"炎夏烈日"是晴天的极端情形，反而说明烈日下不宜种植，不能支撑"晴天优于雨天"，论据方向相反。'},
{id:4,cat:'A',lv:1,type:'judge',stem:'【论证目的】\n某文章引用"删繁就简三秋树"，目的是论证"文章写得越短越好"。\n\n判断：这一判断正确。',ans:'错误',tag:'论据目的误判',analysis:'引用该句是为论证"要力求简短精炼"，上下文补充"宜短则短，宜长则长"，结论是内容决定形式，而非"越短越好"。'},
{id:5,cat:'A',lv:1,type:'judge',stem:'【论证结构】\n某篇文章先提出"文章要短、实、新"，再分别举例论证三点，最后总结。\n\n判断：该文章采用的是"总—分—总"的论证结构。',ans:'正确',tag:'论证结构识别',analysis:'先总提三个主张，再逐一展开论证，末段总结，符合"总—分—总"结构。'},
{id:6,cat:'A',lv:1,type:'choice',stem:'【论据目的】\n某文章对比发达国家"强调公海自由原则"与发展中国家"强调公海为人类共同财产"的不同主张，这一对比的直接目的是什么？',opts:['A. 证明公海确实属于人类共同财产','B. 证明发展中国家的主张更道德','C. 支撑"人类共同财产原则更有利于可持续开发利用"这一结论','D. 批评发达国家忽视发展中国家利益'],ans:'C',tag:'论据目的识别',analysis:'对比是手段，原文紧接着推出"人类共同财产原则更有利于……更为可行"，这才是论证目标。A混淆论据内容与结论，B、D均无中生有。'},
{id:7,cat:'A',lv:1,type:'choice',stem:'【论证层次】\n某文章论证"构建海洋命运共同体"，分全球层面、地区和双边层面分别阐述路径。对其论证结构描述正确的是哪项？',opts:['A. 递进关系：从小到大，从地区推及全球','B. 并列关系：不同层面各有侧重，平行展开','C. 因果关系：全球层面的成功导致地区层面的实施','D. 转折关系：全球方案行不通，才转向地区方案'],ans:'B',tag:'论证结构层次',analysis:'原文明确"着眼于不同的路径"，全球层面与地区层面并列展开，无先后因果，选B。'},
{id:8,cat:'A',lv:1,type:'judge',stem:'【论据充分性】\n某文章论点是"偷梁换柱加固方法对整体结构干扰小"，论据是"假柱仅用于临时支撑，且在原柱撤去后新柱安装前能与梁临时组成稳定体系"。\n\n判断：该论据充分支撑了论点。',ans:'正确',tag:'论据充分性判断',analysis:'论据直接说明假柱在过渡阶段维持稳定，这正是"干扰小"的具体体现，支撑有效。'},
{id:9,cat:'A',lv:1,type:'judge',stem:'【论证目的】\n某文章提到"每个新手辩论者和犯错误的小学生都知道如何挑选最有利于自己的真相"，目的是论证新手辩论者和小学生不诚实。\n\n判断：这一判断正确。',ans:'错误',tag:'类比论证目的误判',analysis:'该句是类比，目的是揭示"挑选真相是普遍行为"，从而批判媒体使用"竞争性真相"，并非评价辩论者或小学生的诚实问题。'},
{id:10,cat:'A',lv:1,type:'choice',stem:'【论据对应论点】\n某文章论述"中国考古学有能力担当重写上古史的重任"。下列哪项论据与该论点联系最直接？',opts:['A. 考古学文化时空框架体系基本建立','B. 出土文物填补了四川三星堆等地历史空白','C. 二里头遗址是否为夏都在学界仍有争议','D. 传统文献展示的金银器名目数量颇多'],ans:'B',tag:'论据筛选',analysis:'B直接指向"填补空白"，是考古学成就的具体证据，最直接支撑"有能力重写上古史"。A是背景条件，C是存疑问题，D来自另一篇文章。'},
{id:11,cat:'A',lv:1,type:'judge',stem:'【论证完整性】\n某文章论点是"远读是数字人文的基石"，只提供了"远读可统计大规模文本"这一论据。\n\n判断：仅凭这一论据，该论证完整成立。',ans:'错误',tag:'论证完整性',analysis:'"可统计大规模文本"只说明远读的功能，未说明为何是"基石"而非其他方法，论据不足以支撑"基石"这一强主张。'},
{id:12,cat:'A',lv:1,type:'choice',stem:'【论据方向】\n某文章论点是"湿不如干（宁可偏干，不可过湿）"。下列哪项论据最能支撑这一论点？',opts:['A. 过干的花树枝叶暂时憔悴，浇水后可立刻补救','B. 雨天种植泥土容易成块','C. 炎夏每日须浇灌','D. 浇灌须在热气全消时进行'],ans:'A',tag:'论据方向匹配',analysis:'"过干可补救"正面支撑"宁可偏干"，即偏干的代价小于偏湿。其余三项谈的是浇灌时机，与"干湿取舍"的论点方向不直接对应。'},
{id:13,cat:'A',lv:1,type:'judge',stem:'【论证目的】\n某文章引用《庄子》"凫胫虽短，续之则忧；鹤胫虽长，断之则悲"，目的是论证"文章要长短错落有致"。\n\n判断：这一判断正确。',ans:'错误',tag:'引用目的误判',analysis:'引用目的是论证"文章长短视具体情况而定，宜短则短，宜长则长"，强调适宜性，而非"长短错落有致"这一形式要求。'},
{id:14,cat:'A',lv:1,type:'choice',stem:'【论证结构识别】\n某文章先说"文学史框架建立在相对确定的价值体系之上"，再说"文学批评是个人化的、多样化的"，最后说"没有文学批评的繁荣发展，文学史无法独立支撑自己"。这三句话的逻辑关系是？',opts:['A. 并列：分别介绍两个独立概念','B. 递进：从文学史讲到文学批评，层层深入','C. 对比后综合：先区分两者差异，再揭示相互依存关系','D. 因果：文学史的稳定性导致文学批评的多样性'],ans:'C',tag:'论证结构识别',analysis:'文章先对比文学史（稳定）与文学批评（多元），再揭示二者的依存关系，是"对比→综合"结构，选C。'},
{id:15,cat:'A',lv:1,type:'judge',stem:'【论据与论点的逻辑链】\n某文章论点是"种植花树与教育儿童无异"，论据是"教育儿童最要条件为多注意、少干涉，种树亦然"。\n\n判断：该论据是通过类比的方式支撑论点的。',ans:'正确',tag:'类比论证',analysis:'以教育儿童的原则类比种树的养护原则，论据通过类比推理支撑论点，判断正确。'},
{id:16,cat:'A',lv:1,type:'choice',stem:'【论证层次】\n某文章"偷梁换柱"科普文分三个角度论证加固方法的科学性：梁的角度、柱的角度、整体结构角度。这三个角度的关系是？',opts:['A. 递进：从局部到整体，逐步深入','B. 并列：三个独立视角，互不依赖','C. 因果：梁稳定导致柱稳定，柱稳定导致整体稳定','D. 转折：前两个角度有局限，第三个角度才是核心'],ans:'A',tag:'论证层次',analysis:'从梁→柱→整体结构，是从局部构件到整体系统的递进，视角逐步扩大，选A。'},
{id:17,cat:'A',lv:1,type:'judge',stem:'【论证目的】\n某文章提到吕绍虞《中国目录学史稿》用"分期断代法"论述，目的是证明姚名达的"主题分述法"存在严重缺陷。\n\n判断：这一判断正确。',ans:'错误',tag:'对比论据目的误判',analysis:'提到吕绍虞是为了说明"断代法也未尝不可"，从而衬托姚名达"敢于学术创新"值得肯定，并非批评主题分述法。'},
{id:18,cat:'A',lv:1,type:'choice',stem:'【论证前提识别】\n某文章论证"中国可以通过持久战最终打败日本"，其核心前提是什么？',opts:['A. 日本是小国，经不起长期战争消耗','B. 中国军队装备逐步改善','C. 西方国家会调停中日争端','D. 中国单次战役可以速战速决'],ans:'A',tag:'核心前提识别',analysis:'文章核心逻辑是"日本小而强→经不起持久消耗→中国可以持久战取胜"，A是这个论证的关键前提。B是手段，C是错误寄望，D是战术细节。'},
{id:19,cat:'A',lv:1,type:'judge',stem:'【结论范围】\n某文章通过分析"中日战争的特殊条件"，得出"中国必须打持久战"的结论。\n\n判断：可以据此推论"所有落后大国对抗先进小国都必须打持久战"。',ans:'错误',tag:'结论过度推广',analysis:'文章结论明确针对"中日战争"的特定历史条件，不能普遍化为所有落后大国的必然规律。这是以偏概全的典型错误。'},
{id:20,cat:'A',lv:1,type:'choice',stem:'【论据充分性】\n某文章论证"藜麦消费量下降与价格上涨无明显联系"，使用了以下哪个论据？',opts:['A. 藜麦价格在2006至2013年间上涨了两倍','B. 两个国家的藜麦消费量在价格上涨前就已缓慢下降','C. 玻利维亚农民开始购买进口食品','D. 西方媒体发表了大量批评文章'],ans:'B',tag:'论据识别',analysis:'B直接说明"消费量下降早于/独立于价格上涨"，打断了"价格涨→消费降"的因果链，是反驳价格决定论的有效论据。'},
{id:21,cat:'A',lv:1,type:'judge',stem:'【论据与论点的逻辑链】\n某文章论点是"网络空间需要每个人给予他人应有的尊重"，论据是"青年是网民的主体"。\n\n判断：该论据直接支撑了上述论点。',ans:'错误',tag:'论据相关性',analysis:'"青年是网民主体"支撑的是"引导青年有助于网络治理"，而非直接支撑"需要给他人尊重"，两者有逻辑距离。'},
{id:22,cat:'A',lv:1,type:'choice',stem:'【论证方向】\n某文章论证"消极修辞的总目标是明白"，列举了"概念的、抽象的语言"与"感性的、具体的语言"的对比。这一对比服务于哪个结论？',opts:['A. 证明抽象语言比具体语言更有文采','B. 证明科学文字应避免感性语言，以确保表意不含混','C. 证明文学写作不需要追求明白','D. 证明法令文字必须使用专业术语'],ans:'B',tag:'论据服务方向',analysis:'对比的目的是支撑"消极修辞以明白为目标，须用概念抽象普通的语言"，B准确复述了这一逻辑链。'},
{id:23,cat:'A',lv:1,type:'judge',stem:'【论证前提与结论匹配】\n某文章论证"地下世界的研究比任何时候都更重要"，前提是"气候变化导致原本深埋地下的事物正在暴露地面"。\n\n判断：该前提能有效支撑上述结论。',ans:'正确',tag:'前提与结论匹配',analysis:'"地下事物暴露"意味着地下世界的变化开始影响地面，因此研究地下世界变得更加紧迫，前提支撑结论。'},
{id:24,cat:'A',lv:1,type:'choice',stem:'【结论超出前提】\n某文章通过毛泽东寻乌调查的案例，论证了什么？',opts:['A. 毛泽东是中国历史上最伟大的调查研究者','B. 深入、唯实的调查作风值得学习','C. 农村调查比城市调查更重要','D. 领导干部必须亲自下乡才能做好调查'],ans:'B',tag:'案例支撑结论识别',analysis:'文章用毛泽东案例说明"深入、唯实的作风值得学习"，这是原文明确的结论。A是价值判断，原文未提；C、D均超出原文范围。'},
{id:25,cat:'A',lv:1,type:'judge',stem:'【论证结构】\n某文章先提出"水在杯壁处形成弯月面"，再解释毛细作用，再分析河岸泥土高于水面被浸湿的现象，最后解释风暴时洪涝风险增大的原因。\n\n判断：这是一个"现象→原理→应用"层层递进的论证结构。',ans:'正确',tag:'递进论证结构',analysis:'从厨房小现象出发，建立原理（毛细作用），再应用于自然界（河岸）和气象预测（洪涝），符合"现象→原理→应用"的递进结构。'},
{id:26,cat:'A',lv:1,type:'choice',stem:'【论证目的】\n某文章引用小说家"语言是建筑材料"和历史学家"语文学方法"的话，目的是什么？',opts:['A. 证明文学研究比历史研究更重要','B. 说明造型与纹饰可以像语言一样被研究和解读','C. 批评现有金银器研究缺乏理论深度','D. 证明金银器研究需要跨学科合作'],ans:'B',tag:'引用目的识别',analysis:'原文明确"这两段话同样可以移用于作为艺术语汇的造型与纹饰"，引用目的是类比说明研究思路，选B。'},
{id:27,cat:'A',lv:1,type:'judge',stem:'【论据与论点方向】\n某文章论点是"文学批评不能以文学史框架为当然标准"，论据是"文学史永远只是一个粗略的框架，不可能穷尽对所有作品的认识"。\n\n判断：该论据与论点方向一致，能有效支撑论点。',ans:'正确',tag:'论据方向判断',analysis:'"文学史是粗略框架"说明其局限性，这正是"不能以它为当然标准"的依据，方向一致，支撑有效。'},
{id:28,cat:'A',lv:1,type:'choice',stem:'【论据目的辨析】\n某文章在论证"社会科学研究需要观察者与被观察者充分合作"时，使用了"医生与病人"的类比。该类比的核心逻辑是什么？',opts:['A. 病人信任医生是因为医生有权威','B. 被研究者配合研究者是因为研究结果有利于被研究者','C. 研究者应该像医生一样穿白大褂','D. 医学研究是社会科学的一个分支'],ans:'B',tag:'类比核心逻辑',analysis:'类比的关键：病人没有理由欺骗医生（欺骗结果是自己受害），类推到"研究站在被调查者利益上，他们就会配合"，选B。'},
{id:29,cat:'A',lv:1,type:'judge',stem:'【论证结构】\n某篇关于中华饮食文化的文章，论证结构是：先追溯儒家对口腹之欲的压制，再说明宋代转折，再说明明清美食家出现，最后以袁枚为高峰。\n\n判断：该文采用的是时间顺序的纵向论证结构。',ans:'正确',tag:'纵向论证结构',analysis:'文章沿历史时间轴展开，从春秋→宋→明清→袁枚，是典型的纵向时间线论证结构，判断正确。'},
{id:30,cat:'A',lv:1,type:'choice',stem:'【论据充分性】\n某文章论证"《随园食单》完成了饮食文化从经验向理论的蜕变"。下列哪项论据最直接支撑这一论点？',opts:['A. 袁枚主张"性灵说"','B. 《随园食单》记载了大量南北美食','C. 《随园食单》中"须知单""戒单"对物性、火候等进行了系统梳理','D. 袁枚认为饮食之道堪与周公孔子之为相媲美'],ans:'C',tag:'论据直接性',analysis:'"系统梳理物性、火候"正是"理论化"的具体体现，直接支撑"经验→理论"这一论点。A是诗学主张，B是内容广度，D是态度，均非"理论化"的直接证据。'},
{id:31,cat:'A',lv:1,type:'judge',stem:'【论证整体走向】\n某文章先提出"亡国论和妥协论者认为中国军力经济力不如日本，无法实现优势"，再予以反驳。\n\n判断：该文采用的是"立靶子—打靶子"的驳论结构。',ans:'正确',tag:'驳论结构识别',analysis:'先树立对立观点（亡国论），再用"人力人心"等论据逐一反驳，是典型的驳论（破—立）结构，判断正确。'},
{id:32,cat:'A',lv:1,type:'choice',stem:'【论据在论证中的位置】\n某文章论证"数字人文赋予我们提出新问题的能力"，然后举例"五千年来全人类使用最频繁的词是什么"。该例子在论证中起什么作用？',opts:['A. 是核心论点','B. 是反驳远读局限性的论据','C. 是具体化"新问题"的例证','D. 是说明数字人文局限性的论据'],ans:'C',tag:'论据功能识别',analysis:'"五千年最频繁词"是"新问题"的具体实例，用于说明数字人文使哪类问题成为可能，是例证而非论点本身，选C。'},
{id:33,cat:'A',lv:1,type:'judge',stem:'【论证目的】\n某文章提到"《叙论篇》首先对目录、目录学等基本概念加以定义"，目的是论证姚名达的学术方法与西方现代学科规范接轨。\n\n判断：这一判断正确。',ans:'正确',tag:'论证目的识别',analysis:'原文紧接着说"提纲挈领，宣示宗旨，很符合现代学科的规范"，《叙论篇》的介绍正是服务于"受西方现代学科理论影响"这一论点。'},
{id:34,cat:'B',lv:1,type:'judge',stem:'【偷换概念】\n原文：构建海洋命运共同体应该着眼于不同的路径，这样才更具有可行性。\n推论：构建海洋命运共同体，应当从地区和双边逐步推广至全球，这样才更有可行性。\n\n判断：推论与原文意思一致。',ans:'错误',tag:'偷换指代',analysis:'"这样"在原文指"着眼于不同路径（分层处理）"，推论将其偷换为"从地区推至全球"的顺序关系，改变了原文含义。'},
{id:35,cat:'B',lv:1,type:'judge',stem:'【无中生有】\n原文：考古发现的实物，就名目和数量而言，虽只是载籍的冰山一角，却是以形象示人。\n推论：考古发现的实物价值和意义超过典籍记载。\n\n判断：推论在原文中有依据。',ans:'错误',tag:'无中生有',analysis:'原文只说考古实物"以形象示人"有其特殊价值，并未与典籍记载进行优劣比较，推论无中生有。'},
{id:36,cat:'B',lv:1,type:'judge',stem:'【以偏概全】\n原文：炎夏烈日，每日浇灌，或晨夕各一次。浇灌必须在日尚未出或日已没落时，地面热气全消，方为有益无害。\n推论：炎夏每日浇灌容易导致根部腐烂。\n\n判断：推论符合原文意思。',ans:'错误',tag:'条件省略导致以偏概全',analysis:'原文说炎夏每日浇灌是正确做法，但须在热气消散后进行。推论省略了关键时间条件，导致错误结论。'},
{id:37,cat:'B',lv:1,type:'choice',stem:'【谬误类型识别】\n原文："各国应致力于构建更加公正合理、稳定有效的国际法和国际规则体系"。\n推论：既有的国际法和国际规则体系不够完备，效率不高。\n\n该推论犯了什么谬误？',opts:['A. 以偏概全','B. 曲解文意：把"需要更好"误读为"现在很差"','C. 偷换概念','D. 滑坡谬误'],ans:'B',tag:'比较级曲解',analysis:'"更加公正合理"只说明现有体系有提升空间，不意味着"不完备、效率不高"，推论将比较级目标误读为对现状的否定。'},
{id:38,cat:'B',lv:1,type:'judge',stem:'【强加因果】\n原文：金银器通过销熔的办法可以反复改变样态；金银器可谓一俗到骨，传世实物数量偏少。\n推论：正因为金银器的"俗"和反复销熔，所以传世实物数量偏少。\n\n判断：推论正确。',ans:'错误',tag:'强加因果',analysis:'原文只是并列描述两个特点，没有建立因果关系，推论强行将并列关系变成因果关系。'},
{id:39,cat:'B',lv:1,type:'judge',stem:'【或然变必然】\n原文：这些受到错误解读的真相可能会对当地的人们造成真正的伤害。\n推论：一场良心危机对玻利维亚和秘鲁当地居民造成了真正的伤害。\n\n判断：推论正确表达了原文的意思。',ans:'错误',tag:'或然变必然',analysis:'原文用"可能会"表示不确定性，推论去掉"可能"变成已发生的确定事实，是典型的或然变必然谬误。'},
{id:40,cat:'B',lv:1,type:'choice',stem:'【谬误识别】\n原文：《中国目录学史》的各篇"采多样之体例"，使内容不受体例束缚。\n推论：《中国目录学史》的缺点是"强立名义"。\n该推论犯了什么错误？',opts:['A. 无中生有','B. 张冠李戴：把批评传统目录学的话安在了《中国目录学史》身上','C. 以偏概全','D. 偷换概念'],ans:'B',tag:'张冠李戴',analysis:'"强立名义"是对传统"断代法"的批评，并非《中国目录学史》自身的缺点，推论张冠李戴。'},
{id:41,cat:'B',lv:1,type:'judge',stem:'【扩大外延】\n原文：当数据量或数据精度超出了个人阅读理解的能力范围时，才有理由借助计算机。\n推论：选择远读还是细读，取决于阅读对象是大规模文本集合还是单篇文本。\n\n判断：推论准确复述了原文。',ans:'错误',tag:'偷换标准',analysis:'原文标准是"数据量是否超出个人能力"，推论将标准错误替换为"文本数量"，偷换了判断依据。'},
{id:42,cat:'B',lv:1,type:'judge',stem:'【诉诸权威不当】\n某文章说"美国宇航局宣布藜麦是地球上营养最均衡的食物之一"，因此藜麦是最适合普通人日常饮食的食物。\n\n判断：这一推论逻辑成立。',ans:'错误',tag:'诉诸权威不当',analysis:'"适合宇航员"的营养均衡标准不等于"最适合普通人日常饮食"，两者需求不同，这是诉诸权威不当。'},
{id:43,cat:'B',lv:1,type:'choice',stem:'【谬误类型】\n原文：中日战争的必然趋势是中国由劣势到平衡到优势。\n推论：任何落后大国面对先进小国，都必然经历由劣势到优势的持久战过程。\n\n该推论犯了什么错误？',opts:['A. 偷换概念','B. 以偏概全：把特定历史条件下的结论普遍化','C. 因果倒置','D. 滑坡谬误'],ans:'B',tag:'以偏概全',analysis:'原文结论建立在中日战争特殊条件下，推论将其普遍化为"所有落后大国"的规律，是以偏概全。'},
{id:44,cat:'B',lv:1,type:'judge',stem:'【条件混淆】\n原文：只有立柱具有充足的承载力，且与梁有可靠连接时，才能有效承担梁传来的作用力。\n推论：立柱具有充足的承载力，就能有效承担梁传来的作用力。\n\n判断：推论正确。',ans:'错误',tag:'必要条件误作充分条件',analysis:'原文用"只有……才"表示必要条件，两个条件缺一不可，推论省略了"可靠连接"条件，把必要条件误当充分条件。'},
{id:45,cat:'B',lv:1,type:'judge',stem:'【偷换概念】\n原文：文学史的编写者承认这个框架是合理的，是有他们自己的文学感受和理解做根据的。\n推论：文学史教材的出现，标志着文学研究者对文学史框架的合理性有了一致的认识。\n\n判断：推论准确复述了原文。',ans:'错误',tag:'部分扩大为全体',analysis:'原文说"编写者"承认合理，推论扩大为"文学研究者"（全体）有"一致的认识"，偷换了主体范围。'},
{id:46,cat:'B',lv:1,type:'choice',stem:'【谬误识别】\n原文：袁枚将饮食之道视为堪与周公孔子之为相媲美的事业。\n推论：袁枚将自己的饮食之道当作与周公孔子的饮食之道相媲美的不朽事业。\n\n该推论犯了什么错误？',opts:['A. 无中生有','B. 偷换比较对象：原文比较"事业类型"，推论变成"饮食之道互相比较"','C. 扩大外延','D. 强加因果'],ans:'B',tag:'比较对象偷换',analysis:'原文是袁枚将"饮食之道"（事业）比作"周公孔子之为"（事业贡献），推论改为把自己的饮食之道与周公孔子的饮食之道比，偷换了比较对象。'},
{id:47,cat:'B',lv:1,type:'judge',stem:'【论点偷换】\n原文：文章用较大篇幅讨论海洋的发展和生态环保问题，是为了引出"如何在利用资源的同时促进可持续发展"这一问题。\n推论：文章用较大篇幅讨论这些问题，凸显了它们的优先性。\n\n判断：推论与原文一致。',ans:'错误',tag:'论据目的误判',analysis:'较大篇幅的讨论是为了"引出问题"，即作为论证铺垫，而非表明这些问题比其他问题"更优先"。'},
{id:48,cat:'B',lv:1,type:'choice',stem:'【谬误类型】\n某推论说："西方语言没有不时省略主语的句式特点，所以叙事时较难将人物和场景融为一体。"原文只说"中国古代句式不时省略主语，更强化了三体交融的效应"。该推论犯了什么错误？',opts:['A. 以偏概全','B. 无中生有：原文未提西方语言的特点，推论凭空添加','C. 偷换概念','D. 因果倒置'],ans:'B',tag:'无中生有',analysis:'原文只谈中文省略主语的效果，完全未提及西方语言，推论将原文的沉默解读为"西方语言没有此特点"，无中生有。'},
{id:49,cat:'B',lv:1,type:'judge',stem:'【扩大范围】\n原文：袁枚把人文主义引入饮食，宣扬"物为人用，使之死可也，使之求死不得不可也"。\n推论：袁枚把人文主义融入饮食，表现在三方面：尊重物性、不要浪费、物为人用保护生命。\n\n判断：推论准确归纳了原文。',ans:'错误',tag:'概念归属混淆',analysis:'"尊重物性""不要浪费"是袁枚将"性灵说"融入饮食的体现，而非"人文主义"的体现，推论将不同概念下的内容混归于"人文主义"。'},
{id:50,cat:'B',lv:1,type:'judge',stem:'【滑坡谬误】\n某推论说："如果文学批评不断冲击文学史，最终文学史框架会彻底崩溃，文学研究将陷入混乱。"\n\n判断：原文支持这一推论。',ans:'错误',tag:'滑坡谬误',analysis:'原文说文学批评对文学史只有"局部充实和微调"，"文学史的力量是强大的，像一道堤坝"，并无崩溃的逻辑链，该推论是无依据的滑坡推理。'},
{id:51,cat:'B',lv:1,type:'choice',stem:'【谬误识别】\n某推论说："土星5号体型庞大，是因为它需要把逃逸塔和登月舱送入月球轨道，在飞行途中它会不断分离以减轻自重。"原文只说土星5号"庞大的身躯稳健有力"并描述了各级分离过程。该推论主要犯了什么错误？',opts:['A. 原因归纳错误：庞大的原因和分离的目的均被误读','B. 以偏概全','C. 偷换概念','D. 时间顺序错误'],ans:'A',tag:'强加原因',analysis:'原文未说明土星5号庞大的原因；各级分离是为了推进效率而非"减轻自重"，推论对两个原因的归纳均无文本依据，属强加原因。'},
{id:52,cat:'B',lv:1,type:'judge',stem:'【无中生有】\n原文：中国目录学史也未尝不可用"断代法"来编写，但我们对他敢于学术创新的肯定是无须见仁见智的。\n推论：断代法比主题分述法更能接近历史本来面貌。\n\n判断：推论在原文中有依据。',ans:'错误',tag:'无中生有',analysis:'原文仅说两种方法都可行，并未比较哪种"更接近历史真相"，推论无中生有且与原文"肯定创新"的立场相悖。'},
{id:53,cat:'B',lv:1,type:'judge',stem:'【因果倒置】\n原文：藜麦种植户家庭支出的增长速度最快，农民们正在变富，将新收入转化为支出又给周边民众带来了好处。\n推论：周边民众变富，导致藜麦农民的家庭支出增长。\n\n判断：推论符合原文的因果方向。',ans:'错误',tag:'因果倒置',analysis:'原文因果链是"藜麦农民先变富→将收入转化为消费→带动周边民众"，推论颠倒了因果方向。'},
{id:54,cat:'B',lv:1,type:'choice',stem:'【谬误类型】\n原文："夫礼之初，始诸饮食"，意即礼仪制度和风俗习惯始于饮食活动。\n推论：饮食活动从一开始就被赋予了礼仪要求。\n该推论犯了什么错误？',opts:['A. 无中生有','B. 因果倒置：原文是"礼始于饮食"，推论变成"饮食被赋予礼"，方向相反','C. 以偏概全','D. 偷换概念'],ans:'B',tag:'因果倒置',analysis:'"礼始于饮食"意为"礼仪从饮食活动中产生"，推论改为"饮食被赋予礼"，颠倒了"礼"与"饮食"的逻辑起点关系。'},
{id:55,cat:'B',lv:1,type:'judge',stem:'【强加比较】\n原文：与主题分述法相比，中国目录学史也未尝不可用断代法来编写。\n推论：断代法与主题分述法相比，前者更优。\n\n判断：推论符合原文立场。',ans:'错误',tag:'强加比较结论',analysis:'原文说两种方法都可行（"未尝不可"），并无优劣评价，推论强加了优劣判断。'},
{id:56,cat:'B',lv:1,type:'choice',stem:'【谬误识别】\n某推论说："文学史编写者和同意文学史观点的研究者应避免介入文学批评，以维持文学史框架的权威性。"原文说他们"以个人身份参加到文学研究行列中，以平等姿态与批评者进行讨论"。该推论犯了什么错误？',opts:['A. 扩大外延','B. 方向相反：原文鼓励参与，推论变成"应避免"','C. 时间顺序错误','D. 无中生有'],ans:'B',tag:'方向相反的曲解',analysis:'原文明确说编写者"同样会……参加"讨论，推论变成规范性的"应避免"，与原文方向完全相反。'},
{id:57,cat:'B',lv:1,type:'judge',stem:'【诉诸权威】\n某文章论证"近代以来中国考古学取得巨大成就"，引用了习近平总书记的评价。某人推论：仅因为习近平总书记给予了评价，所以中国考古学的成就是真实的。\n\n判断：这一推论的逻辑充分吗？',ans:'错误',tag:'诉诸权威',analysis:'引用权威评价是佐证，但成就的真实性应由具体考古发现来支撑。仅凭权威评价无法独立证明成就，"仅因为"这一限定使推论过强。'},
{id:58,cat:'B',lv:1,type:'choice',stem:'【谬误类型】\n原文：地区大国和地区性安全架构应该在让局势降温、避免军事冲突方面发挥主要作用。\n推论：在海洋命运共同体的构建中，地区大国理应发挥比全球机构更大的作用。\n\n该推论犯了什么错误？',opts:['A. 无中生有：原文未进行跨层级比较，推论添加了"比全球机构更大"的比较','B. 以偏概全','C. 偷换概念','D. 因果倒置'],ans:'A',tag:'添加比较无中生有',analysis:'原文只说在地区层面，地区大国发挥"主要作用"，这是该层面内部的定位，并未与全球层面机构比较，推论添加了跨层比较，无中生有。'},
{id:59,cat:'B',lv:1,type:'judge',stem:'【概念混淆】\n原文：深时是地下世界的纪年，其计量单位是"世"和"宙"，而不是"分"和"年"。\n推论：深时是一种主观感受，描述人在地下探险时感到时间漫长的心理体验。\n\n判断：推论正确。',ans:'错误',tag:'概念偷换',analysis:'"深时"是地质学概念，指地球漫长的客观历史时间，与人的主观感受无关，推论将客观地质概念偷换为主观心理体验。'},
{id:60,cat:'B',lv:1,type:'choice',stem:'【谬误识别】\n原文第一段中心观点是"树木通过气味沟通"，具体论述金合欢树通过气体向邻近树木发出警告。\n某推论说："近读橡树时，橡树为自救把苦涩的单宁酸导入树皮，这可以作为证明树木通过气味沟通这一观点的材料。"\n该推论是否成立？',opts:['A. 成立，橡树案例与金合欢树案例原理一致','B. 不成立，橡树导入单宁酸是自救行为，未体现通过气味与其他树木沟通','C. 成立，只要涉及植物防御都可以支撑该观点','D. 不成立，因为橡树不是金合欢树'],ans:'B',tag:'论据与论点不符',analysis:'第一段论点是"树木通过气味向邻近树木发出警告（沟通）"，橡树案例是自身防御，未体现"与其他树木通过气味沟通"这一核心要素。'},
{id:61,cat:'B',lv:1,type:'judge',stem:'【扩大充分条件】\n原文：社会调查者若不站在被调查者利益上，会遭遇"秘密"和"撒谎"。\n推论：只要研究者站在被调查者利益上，就绝不会遭遇任何障碍。\n\n判断：推论正确。',ans:'错误',tag:'充分条件扩大',analysis:'原文说"不利于被调查者→遭遇阻碍"，推论将其反向推为"有利于→绝不遭遇障碍"，忽略了其他可能影响因素，过度扩大了充分条件的效力。'},
{id:62,cat:'B',lv:1,type:'choice',stem:'【谬误类型识别】\n某人说："《论持久战》的持久战思想不是毛泽东最早提出的，因为蒋百里等人都有过类似言论。"\n原文对此如何回应？这体现了什么逻辑原则？',opts:['A. 原文否认蒋百里等人的言论，体现"第一手证据优先"原则','B. 原文区分"观察到战争会持久"与"科学的持久战战略"，体现概念精确性原则','C. 原文承认毛泽东不是第一人，体现谦逊原则','D. 原文用时间先后反驳，体现历史优先原则'],ans:'B',tag:'概念区分回应谬误',analysis:'原文指出"仅看到持久性"不等于"持久战战略思想"，后者需要对复杂因素的科学分析，通过精确区分概念来回应混淆。'},
{id:63,cat:'B',lv:1,type:'judge',stem:'【目的错置】\n某推论说："文章较大篇幅讨论地下世界的奇观，是为了激发读者对探险的好奇心，这是文章的主要目的。"\n\n判断：依据原文，该推论正确。',ans:'错误',tag:'目的层次混淆',analysis:'描述地下世界奇观是论证手段，文章主要目的是论证"需要用深时视角看问题并采取行动"，推论将论证手段误认为文章目的。'},
{id:64,cat:'B',lv:1,type:'choice',stem:'【复合谬误识别】\n关于藜麦事件，某媒体报道标题为"藜麦：对你有利——对玻利维亚人有害"。原文后来揭示藜麦出口实际使玻利维亚农民收入增加。该标题犯了什么逻辑错误？',opts:['A. 诉诸情感，利用读者的道德焦虑','B. 使用片面事实（仅呈现价格上涨），得出了与全面事实相悖的结论','C. 无中生有，价格根本没有上涨','D. 以偏概全，只采访了少数农民'],ans:'B',tag:'片面事实导致错误结论',analysis:'标题利用"价格上涨"这一片面事实，忽略了"农民收入增加"的完整图景，这正是文章所说的"竞争性真相"机制。'},
{id:65,cat:'B',lv:1,type:'judge',stem:'【无关联推论】\n原文：消极修辞开篇列举了"科学文字、法令文字及其他的诠释文"等例子。\n推论：消极修辞仅适用于书面表达，口头表达不需要遵循明白的原则。\n\n判断：推论正确。',ans:'错误',tag:'以例证扩大限制',analysis:'文章举书面文字为例说明消极修辞，但并未限定"仅适用于书面"，推论无中生有地添加了限制条件。'},
{id:66,cat:'B',lv:1,type:'choice',stem:'【谬误识别综合】\n原文：宋元以降，饮食著作的烹饪方法逐渐明晰，但亦停留在"形而下"的层次。\n推论：宋元以降的饮食著作毫无价值，因为停留在"形而下"层次。\n该推论犯了什么错误？',opts:['A. 偷换概念："形而下"被误读为"毫无价值"','B. 因果倒置','C. 以偏概全','D. 无中生有'],ans:'A',tag:'概念误读',analysis:'"形而下"是指停留在操作经验层面，并不等于"毫无价值"，推论对概念的内涵进行了错误解读。'},
{id:67,cat:'C',lv:1,type:'judge',stem:'【概念外延】\n原文将"竞争性真相"定义为：通过许多方式描述一件事物，这些描述可能具有同等的真实性，但呈现不同的世界观。\n\n判断：一篇完全捏造事实的假新闻属于"竞争性真相"。',ans:'错误',tag:'概念外延边界',analysis:'"竞争性真相"的核心特征是"具有同等的真实性"，即所用事实本身是真实的，只是片面选择。完全捏造事实是谎言，不符合该定义。'},
{id:68,cat:'C',lv:1,type:'judge',stem:'【概念内涵】\n"深时"的定义是地下世界的纪年，指地球漫长的历史，计量单位是"世"和"宙"。\n\n判断："深时"的核心含义是时间尺度上人类与地球历史的巨大差异。',ans:'正确',tag:'概念核心内涵',analysis:'原文强调深时"让人类显得微不足道"，其核心意义在于提供一种超越人类视角的时间尺度，判断抓住了概念的核心。'},
{id:69,cat:'C',lv:1,type:'choice',stem:'【概念辨析】\n"偷梁换柱"在成语用法中的含义，与古建筑工程中"偷梁换柱"的含义，主要区别在哪里？',opts:['A. 前者涉及木材，后者涉及金属','B. 前者含"以假代真、欺骗"之意，后者是科学合理的修缮方法','C. 前者是主动行为，后者是被动行为','D. 前者发生在室内，后者发生在室外'],ans:'B',tag:'同名异义概念辨析',analysis:'文章开头即指出两个领域中同一词语的根本区别：成语含贬义（欺骗），工程中则是科学方法，区别在于语义和价值判断，选B。'},
{id:70,cat:'C',lv:1,type:'judge',stem:'【概念范围】\n原文定义"远读"为在大规模文本集合上进行统计特征描述或内在结构揭示。\n\n判断：对单篇文档中所有单字出现频率的计算，也可以属于"远读"的范畴。',ans:'正确',tag:'概念边界延伸',analysis:'原文第四段明确补充：单篇文本数据量也可能超出个人处理能力，此时同样可借助计算机，即远读不限于"多文本"，单篇也适用。'},
{id:71,cat:'C',lv:1,type:'choice',stem:'【概念定义匹配】\n根据原文，"底线伦理"的准确含义是？',opts:['A. 网络上最高层次的道德要求','B. 通过明确"不能做什么"来划定的最低层次网络道德规范，具有法律强制性','C. 网络上鼓励用户积极行善的道德规范','D. 仅针对青年群体的网络行为守则'],ans:'B',tag:'概念定义识别',analysis:'原文明确：底线伦理"通过明确不能做什么""是最低层次的网络道德规范""通常也是有法律强制性的禁区"，B完整对应。'},
{id:72,cat:'C',lv:1,type:'judge',stem:'【概念内涵边界】\n原文定义"等效意识"为：当线上出现道德失范行为时，要将其视为与现实世界中的道德失范行为具有等效的实际影响。\n\n判断：具有"等效意识"的人，其线上行为和线下行为必须完全一致。',ans:'错误',tag:'概念内涵边界',analysis:'"等效意识"要求对线上线下行为提出"同等的道德规范要求"，而非行为本身必须一致。线上下情境不同，行为形式可能不同，但道德标准一致。'},
{id:73,cat:'C',lv:1,type:'choice',stem:'【概念外延】\n根据原文，下列哪项属于"流动视角"中"三体交融"效应的体现？',opts:['A. 叙事者暂停叙述，直接发表议论','B. 读者跟随武松的眼光行进，只看到武松能看到的东西','C. 作者从全知视角描述整个场景','D. 叙事者切换到另一人物视角描述同一场景'],ans:'B',tag:'概念外延识别',analysis:'"三体交融"指叙事者、人物、读者三者采取同一视角，B中读者视野与武松视野重合，正是这一效应的体现。'},
{id:74,cat:'C',lv:1,type:'judge',stem:'【概念误用】\n原文：深时应当促使我们采取行动，而不是变得无动于衷。\n某人说："既然深时让人类显得微不足道，那我们应该接受命运，顺其自然。"\n\n判断：这一解读符合原文对"深时"的应用含义。',ans:'错误',tag:'概念应用误读',analysis:'原文明确说"要警惕逆来顺受的思维"，深时应是"更加激进的视角，促使我们采取行动"，该解读与原文主张完全相反。'},
{id:75,cat:'C',lv:1,type:'choice',stem:'【概念区分】\n"主题分述法"与"断代法"的根本区别是什么？',opts:['A. 前者研究古代，后者研究现代','B. 前者按主题纵贯古今，后者按时代划分分期叙述','C. 前者适用于目录学，后者适用于文学史','D. 前者由姚名达提出，后者由西方学者提出'],ans:'B',tag:'概念核心区别',analysis:'原文明确："主题分述法"是"特取若干主题，通古今而直述"，而通常写法（断代法）是"划分几个发展时期……展现历史全貌"，区别在于组织维度。'},
{id:76,cat:'C',lv:1,type:'judge',stem:'【概念内涵误读】\n"消极修辞"中的"消极"，含义是负面的、应当避免的表达方式。\n\n判断：这一理解正确。',ans:'错误',tag:'概念内涵误读',analysis:'"消极修辞"的"消极"指以"明白"为目标、不追求华丽的修辞取向，是一种方法论立场，而非贬义。与"积极修辞"相对，并非"应避免"。'},
{id:77,cat:'C',lv:1,type:'choice',stem:'【概念边界】\n根据原文，下列哪种情况不属于"偷梁换柱"工程方法的适用范围？',opts:['A. 立柱因长期受压产生开裂残损','B. 立柱底部因潮气出现糟朽残损','C. 梁因年久弯曲变形需要更换','D. 立柱强度下降无法正常支撑梁'],ans:'C',tag:'概念适用边界',analysis:'"偷梁换柱"针对的是立柱的残损，梁只是被临时支撑的对象。梁本身变形需更换的情况超出了该方法的定义范围，C超出适用边界。'},
{id:78,cat:'C',lv:1,type:'judge',stem:'【区分标准误判】\n"细读"与"远读"的根本区别在于：细读处理单篇文本，远读处理文本集合。\n\n判断：这一区分是原文的核心区别标准。',ans:'错误',tag:'区分标准误判',analysis:'原文核心区别标准是"数据量是否超出个人阅读能力"，而非文本数量。单篇文本数据量超限时也可用远读，关键是处理主体（人vs计算机）。'},
{id:79,cat:'C',lv:1,type:'choice',stem:'【概念核心含义】\n"证经补史"的传统史学思路，其核心含义是？',opts:['A. 用考古发现证明和补充经典文献的记载','B. 用科学实验证明历史存在','C. 用考古学完全替代文献史学','D. 用文学创作重构历史情境'],ans:'A',tag:'概念核心含义',analysis:'原文说"证经补史"是"试图将考古学文化体系纳入三皇五帝的古史框架体系之中"，即以考古发现去印证、补充已有文献框架，选A。'},
{id:80,cat:'C',lv:1,type:'judge',stem:'【概念应用判断】\n某中学实验室注意事项写道："实验操作要如临深渊，如履薄冰。"\n\n判断：根据"消极修辞"的标准，这一表述符合实验室注意事项的语言要求。',ans:'错误',tag:'概念应用判断',analysis:'"如临深渊，如履薄冰"是比喻手法，属于感性、华丽的语言。实验室注意事项应使用质实平凡的语言，该表述不符合消极修辞要求。'},
{id:81,cat:'C',lv:1,type:'choice',stem:'【概念内涵】\n"人类共同财产原则"与"公海自由原则"的核心区别是？',opts:['A. 前者允许开发公海，后者禁止开发','B. 前者主张公海不得被任何国家占有、由所有国家共管共享，后者强调技术强国可自由利用','C. 前者是发达国家的主张，后者是发展中国家的主张','D. 前者针对军事用途，后者针对经济用途'],ans:'B',tag:'对立概念辨析',analysis:'原文明确：人类共同财产原则强调"不得被占有，所有国家共同参加管理"；公海自由原则由发达国家主张，利用技术优势开发公海。注意C中主张方向正好相反。'},
{id:82,cat:'C',lv:1,type:'judge',stem:'【概念充分条件误判】\n"数字人文"这一研究形态，其核心特征是使用计算机处理文本。\n\n判断：只要使用了计算机处理文本，就属于数字人文。',ans:'错误',tag:'概念充分条件误判',analysis:'"使用计算机处理文本"是必要手段，但数字人文的核心在于用计算方法回答人文研究的问题并提出新问题。仅使用计算机打字或存档不构成数字人文。'},
{id:83,cat:'C',lv:1,type:'choice',stem:'【概念层次关系】\n根据原文，"反身意识"与"等效意识"的关系是？',opts:['A. 两者完全等同，都要求线上线下行为一致','B. 反身意识是等效意识在自我与他人关系上的延伸','C. 等效意识包含反身意识，后者是前者的一个子集','D. 两者相互对立，分别适用于不同情境'],ans:'B',tag:'概念层次关系',analysis:'原文明确："反身意识"，可以说是等效意识在自我和他人关系上的延伸，B是原文的直接表述。'},
{id:84,cat:'C',lv:1,type:'judge',stem:'【概念适用判断】\n某人在网上散布一条未经核实但主观上认为是真的谣言，造成了他人损失。\n\n判断：根据"不伤害"原则，此行为属于"无意为恶"，违反了底线伦理。',ans:'正确',tag:'概念适用判断',analysis:'原文"不伤害"包括"也不能无意为恶"，散布未核实谣言即使主观无恶意，客观上造成伤害仍违反该原则，判断正确。'},
{id:85,cat:'C',lv:1,type:'choice',stem:'【学科与学科史概念辨析】\n"目录学"与"目录学史"的区别，根据原文最准确的理解是？',opts:['A. 前者研究单本书的目录，后者研究多本书的目录','B. 前者是研究方法，后者是对该方法历史发展的系统研究','C. 前者是古代学问，后者是现代学问','D. 两者完全相同，只是叫法不同'],ans:'B',tag:'学科与学科史概念辨析',analysis:'"目录学"是研究文献分类整理的学问；"目录学史"是研究这一学问如何随历史发展演变的学科，后者是前者的元研究，B准确。'},
{id:86,cat:'C',lv:1,type:'judge',stem:'【概念外延边界】\n"毛细作用"的定义是：水受到某些物体表面的吸引以及自身吸引力的共同作用，在细小开口中向上流动。\n\n判断：水滴从树叶上落下时先拉伸成细长形状，是毛细作用的体现。',ans:'错误',tag:'概念外延边界',analysis:'水滴拉伸是水的表面张力（黏性）的体现，而非毛细作用。毛细作用需要"细小开口"的结构，水滴在空气中落下不符合这一条件。'},
{id:87,cat:'C',lv:1,type:'choice',stem:'【概念核心特征】\n根据原文，"复眼映视式视角"的核心特征是？',opts:['A. 视角始终跟随主角移动','B. 采用多个不同层次的视角（内视角、外视角、旁视角）交替叙述','C. 只使用旁观者视角','D. 省略主语以增强代入感'],ans:'B',tag:'概念核心特征',analysis:'原文通过《阅微草堂笔记》案例说明：先外视角，再内视角，再旁视角，三者交替，使小文本具有多重功能，这是"复眼"的核心。'},
{id:88,cat:'C',lv:1,type:'judge',stem:'【概念迁移辨析】\n"性灵说"与袁枚将其融入饮食的"饮食美学"，是同一个概念。\n\n判断：这一说法正确。',ans:'错误',tag:'概念迁移辨析',analysis:'"性灵说"是袁枚的诗学主张，"饮食美学"是他将这一主张融入饮食领域的应用，两者是"理论来源"与"应用形态"的关系，并非同一概念。'},
{id:89,cat:'C',lv:1,type:'choice',stem:'【概念外延完整识别】\n根据原文，下列哪项符合"依法种植"的完整定义？',opts:['A. 选择阴雨天，深挖土坑，大量浇水','B. 选晴天早晚，泥土干燥，深耕浅种，浇足凉水使根与土结成一体','C. 选晴天正午，深耕深种，少量浇水','D. 选阴天，浅耕浅种，不浇水等待雨水'],ans:'B',tag:'概念外延完整识别',analysis:'原文定义"依法种植"包含四要素：择晴天早晚、泥土干燥、深耕浅种、浇足凉水使根土结为一体，B完整对应。'},
{id:90,cat:'C',lv:1,type:'judge',stem:'【概念功能误读】\n"文学史框架"的核心功能，根据原文，是为所有文学批评活动提供不可改变的权威标准。\n\n判断：这一理解正确。',ans:'错误',tag:'概念功能误读',analysis:'原文说文学史框架是"粗略的框架"，"不可能穷尽"所有认识，文学批评可以"局部充实和微调"它，并非不可改变的权威标准。'},
{id:91,cat:'C',lv:1,type:'choice',stem:'【概念批判性应用】\n某研究者对某个村庄的经济状况进行调查，始终隐瞒自己的真实目的，并以"客观中立"为由拒绝与村民建立信任关系。根据费孝通的观点，这种做法的主要问题是？',opts:['A. 违反了学术诚信原则','B. 混淆了"客观"的含义：真正的客观需要考虑调查者与被调查者的人事关系','C. 没有使用足够先进的统计方法','D. 调查时间太短'],ans:'B',tag:'概念批判性应用',analysis:'原文指出"客观"不是"对观察现象没有兴趣或没有关系"，这不可能，真正的客观要正视并处理好人事关系，B准确。'},
{id:92,cat:'C',lv:1,type:'judge',stem:'【概念关系辨析】\n"调查研究要坚持实事求是"与"调查研究要发扬创新精神"，这两个要求在原文中是相互矛盾的。\n\n判断：这一说法正确。',ans:'错误',tag:'概念关系辨析',analysis:'"实"强调内容真实、不脱实际；"新"强调思想深刻有新意，但不能背离马克思主义立场。两者并不矛盾，"实"是基础，"新"是目标。'},
{id:93,cat:'C',lv:1,type:'choice',stem:'【概念归属识别】\n"满天星斗""多元一体""古国-方国-帝国"是苏秉琦提出的关于中国上古史的叙述体系。这些概念属于哪个研究层面？',opts:['A. 具体遗址的发掘报告','B. 考古学文化时空框架基础上的历史叙述与解释体系','C. 传统文献中的神话传说体系','D. 西方考古学理论的直接移植'],ans:'B',tag:'概念归属识别',analysis:'这些概念是在新石器时代考古学文化区系类型研究基础上提出的宏观历史叙述框架，属于"考古学文化研究→上古史解释"层面，选B。'},
{id:94,cat:'C',lv:1,type:'judge',stem:'【概念边界精确性】\n"数据化"是指将文本转换为计算机可处理的形式，这一过程必然损失原始文本的所有信息。\n\n判断：这一说法符合原文。',ans:'错误',tag:'概念边界精确性',analysis:'原文说数据化"损失了原始文本的丰富语义"，是部分损失，而非"所有信息"。数据化后仍保留可计算的词频、概率等信息。'},
{id:95,cat:'C',lv:1,type:'choice',stem:'【并列概念辨析】\n"祈福"与"怡情"作为金银器纹样设计的两大主旨，二者的区别是？',opts:['A. 前者是皇家专用，后者是民间使用','B. 前者表达对吉祥福祉的愿望，后者表达对情趣美感的追求','C. 前者与宗教有关，后者与世俗无关','D. 原文未区分两者'],ans:'B',tag:'并列概念辨析',analysis:'根据词义与原文语境，"祈福"指祈求吉祥幸福，"怡情"指寄托情趣、美化生活，B准确区分了两者的指向。'},
{id:96,cat:'C',lv:1,type:'judge',stem:'【概念层次结构】\n"地位"这一概念，在种植学文章中包含"方向"和"高低"两个层面。"方向"指种植地点面向阳光的方位，"高低"指种植地点的地势相对高低。\n\n判断：这一理解符合原文。',ans:'正确',tag:'概念层次结构',analysis:'原文明确：地位有两种——方向（向阳/喜阴）和高低（地势高低影响积水）。判断准确复述了概念的内部层次。'},
{id:97,cat:'C',lv:1,type:'choice',stem:'【概念情境应用】\n根据原文"浇灌必依天时干湿而定"，以及"假使干湿难定，则自以较干为宜"，下列哪种情境应当浇灌？',opts:['A. 风和日暖，雨水调畅','B. 天晴较久，夜无露水','C. 刚刚下完大雨','D. 土壤表面潮湿但地下干燥'],ans:'B',tag:'概念情境应用',analysis:'原文明确：风和日暖雨水调畅→不必浇灌；天晴较久夜无露水→间日浇灌。B符合"应当浇灌"的条件，A明确不需浇灌，C土壤已湿。'},
{id:98,cat:'C',lv:1,type:'judge',stem:'【概念应用方向】\n某人将"深时"概念引入个人生活，认为"用几十年的尺度看今天的困难，困难就变得微不足道，所以不必努力解决"。\n\n判断：这一应用符合原文对"深时"意义的阐释。',ans:'错误',tag:'概念应用方向',analysis:'原文明确"深时应当是更加激进的视角，促使我们采取行动，而不是变得无动于衷"，并警惕"逆来顺受的思维"。该应用恰好是原文反对的使用方式。'},
{id:99,cat:'C',lv:1,type:'choice',stem:'【概念核心内涵识别】\n"契约意识"在网络行为中的核心含义是？',opts:['A. 签署书面合同才能保证网络安全','B. 在信息生产传播中，通过遵守权利义务规范来重构信任机制','C. 与平台签署用户协议','D. 要求所有网络行为都有法律约束'],ans:'B',tag:'概念核心内涵识别',analysis:'原文说：网络信息活动产生了新的利益分配问题，"通过订立契约的方式来规范各自权利和义务成为重构信任机制的重要方式"，B准确提炼了核心含义。'},
{id:100,cat:'C',lv:1,type:'judge',stem:'【概念因果关系判断】\n"正义的战争"与"多助"之间，在原文中是因果关系，还是相关关系？\n\n判断：原文认为"战争的正义性"直接导致"获得多方援助"。',ans:'正确',tag:'概念因果关系判断',analysis:'原文逻辑链：日本战争退步野蛮→国际孤立；中国战争进步正义→处于多助。正义性是获得国际援助的逻辑前提，构成因果关系，判断正确。'},
{id:101,cat:'综合',lv:2,type:'choice',stem:'【综合判断】\n原文论点："武器是战争的重要因素，但不是决定因素，决定因素是人不是物。"\n下列哪个选项既能有效削弱该论点，又不犯偷换概念的错误？',opts:['A. 现代战争中武器技术水平决定了战争走向','B. 历史上有很多以弱胜强的案例','C. 人的意志力在战场上很重要','D. 日本的武器比中国好'],ans:'A',tag:'削弱论点+概念精确',analysis:'A直接挑战"武器非决定因素"这一核心论点，且使用了相同的"决定"概念，没有偷换。B、C反而支持原文论点，D是具体事实而非反驳逻辑论点。'},
{id:102,cat:'综合',lv:2,type:'judge',stem:'【综合辨析】\n某文章结论是"《随园食单》开启了中华美食发展的新纪元"。有人认为这等于说"袁枚之前中国没有优秀的饮食文化"。\n\n判断：这一推论成立。',ans:'错误',tag:'结论范围+无中生有',analysis:'"开启新纪元"是说在理论化程度上的突破，不意味着之前无优秀饮食文化，原文对此前文化有记述。这是对"新纪元"概念的曲解，属结论扩大+概念误读。'},
{id:103,cat:'综合',lv:2,type:'choice',stem:'【论证+谬误】\n某文章用"医生与病人"类比论证"社会研究者应站在被调查者利益上"。下列哪项对该类比的批评最有逻辑力量？',opts:['A. 医生和社会研究者的职业背景不同','B. 有些医生也会做出对病人不利的事','C. 医患关系有明确的职业规范约束，社会研究关系不同，该类比可能存在关键差异','D. 医学不是社会科学'],ans:'C',tag:'类比有效性评估',analysis:'有效批评类比需要指出"两个对象在关键维度上的不可比性"。C指出医患关系有制度化约束而研究关系没有，这是关键差异，可能使类比失效。A、D是表面差异，B只是特例。'},
{id:104,cat:'综合',lv:2,type:'judge',stem:'【综合判断】\n某文章说"树木通过气味沟通是防卫行为，而根部发出轻响的研究才刚起步"。\n推论：树木通过声波沟通已被证实，与气味沟通同等重要。\n\n判断：推论符合原文。',ans:'错误',tag:'证据强度+或然变必然',analysis:'气味沟通有大量证据（金合欢等），属已确立事实；声波研究"才刚起步"，只是初步发现。推论将两者等同并将声波沟通说成"已被证实"，夸大了证据强度。'},
{id:105,cat:'综合',lv:2,type:'choice',stem:'【概念+论证】\n"竞争性真相"机制在实际报道中如何运作？下列描述最准确的是？',opts:['A. 记者故意捏造数据来制造轰动效应','B. 记者选择真实但片面的事实，通过叙述方式构建特定世界观，使读者得出有偏差的结论','C. 记者因能力不足而误解了真相','D. 记者出于恶意蓄意伤害当地居民'],ans:'B',tag:'概念机制理解',analysis:'"竞争性真相"的核心是"真实但片面"，不是捏造，也不是能力问题。原文说记者"出于高尚理由"但"通过片面事实呈现世界观"，B准确描述了这一机制。'},
{id:106,cat:'综合',lv:2,type:'judge',stem:'【论证+谬误】\n某文章论证"蒋介石等人的持久战思想不如中共科学"。有人认为：既然蒋介石也提出了持久战，就说明他和毛泽东的战略思想本质上相同。\n\n判断：该推论合理。',ans:'错误',tag:'概念区分+以偏概全',analysis:'原文区分了"观察到战争会持久"（表面现象）与"科学的持久战战略"（深层分析）。蒋介石只做到前者，中共完成了后者。用表面相似否定本质差异，是概念混淆。'},
{id:107,cat:'综合',lv:2,type:'choice',stem:'【概念+论证结构】\n文学史与文学批评的关系，根据原文最准确的描述是？',opts:['A. 文学史是目标，文学批评是实现目标的手段','B. 两者相互对立，各行其是','C. 文学批评是基础，文学史建立其上；文学史是框架，为批评提供参照','D. 文学史比文学批评更重要，应优先发展'],ans:'C',tag:'辩证关系理解',analysis:'原文：文学史建立在文学批评活动基础上；同时文学史框架又为批评提供参照。这是相互依存的辩证关系，C准确，D是原文明确"不在情感上倾向哪方"所排除的。'},
{id:108,cat:'综合',lv:2,type:'judge',stem:'【论证+概念】\n某文章论证"古建筑修缮不采用只在旁边加新柱的简便方法"。有人说这是因为文物保护追求"修旧如故"，节省工料不是优先考量。\n\n判断：这一说法能作为补充理由，但不是原文给出的唯一理由。',ans:'正确',tag:'多重论据识别',analysis:'原文给出三层理由：受力稳定性、原位设计精确性、文物保护原则。"修旧如故"属第三层，确实是充分理由之一，而非唯一。'},
{id:109,cat:'综合',lv:2,type:'choice',stem:'【综合辨析】\n"深时"视角有两种可能的心理反应（积极行动vs无动于衷）。原文对哪种反应持肯定态度，对哪种持批评态度？',opts:['A. 肯定无动于衷，批评过度行动','B. 肯定积极行动，批评逆来顺受的无动于衷','C. 两种态度都肯定，认为各有道理','D. 两种态度都批评，主张超然物外'],ans:'B',tag:'作者立场判断',analysis:'原文"我们要警惕逆来顺受的思维""深时应当是更加激进的视角，促使我们采取行动，而不是变得无动于衷"，立场明确，选B。'},
{id:110,cat:'综合',lv:2,type:'judge',stem:'【论证+概念】\n某人认为：只要在网络上做到"五不"（不伤害、不偷盗、不造假、不浪费、不盲从），就已经具备了完整的文明网络行为观。\n\n判断：这一认识符合原文。',ans:'错误',tag:'概念层次完整性',analysis:'"五不"只是底线伦理（否定性规范），原文说还需要"基准意识"（等效、反身、价值、契约等积极规范）。仅有底线伦理不等于完整的文明网络行为观。'},
{id:111,cat:'综合',lv:2,type:'choice',stem:'【论证结构内在逻辑】\n某文章在科普"偷梁换柱"时，先定义梁、柱及其功能，再介绍加固步骤，再分析科学原理。这一结构安排的逻辑依据是？',opts:['A. 从复杂到简单，方便不同层次读者','B. 先建立概念基础，再描述操作，再解释原理——从认知到实践到理论','C. 随机排列，无特定逻辑','D. 先理论后实践，再用实践验证理论'],ans:'B',tag:'论证结构内在逻辑',analysis:'定义概念是理解后续内容的前提，步骤描述是具体操作，原理分析是理论解释，这是"认知基础→实践操作→理论解释"的递进结构，选B。'},
{id:112,cat:'综合',lv:2,type:'judge',stem:'【谬误+概念】\n某人说："《中国目录学史》采用主题分述法，忽顾古今，使读者迷乱——这是该书的根本缺陷。"\n\n判断：这一说法忠实反映了原文作者的立场。',ans:'错误',tag:'作者立场+引用曲解',analysis:'"使读者迷乱"是姚名达本人自述的"尤其大患"，是一种自我审视，但其结论是"利弊相权，依史之所宜，采多样之体例"加以克服。原文作者总体肯定此书。'},
{id:113,cat:'综合',lv:2,type:'choice',stem:'【概念+论据评估】\n下列哪项最能支撑"植物可以通过地下真菌网络传递信息"这一观点？',opts:['A. 金合欢树在被啃食时会分泌毒素','B. 研究发现林地土壤中真菌将单独树木连成联通的森林，并可传递信号','C. 谷物幼苗会向声源方向生长','D. 人工栽培植物失去了沟通能力'],ans:'B',tag:'论据直接性判断',analysis:'B直接描述了"真菌网络作为信息传递媒介"这一机制，最直接支撑原观点。A是气味沟通，C是声波沟通，D是反例，均不涉及地下真菌网络机制。'},
{id:114,cat:'综合',lv:2,type:'judge',stem:'【论证+谬误】\n某调查报告显示：A地区实施了政策X后，当地GDP增长了10%。结论：政策X导致了GDP增长。\n\n判断：根据费孝通关于社会调查的观点，该结论存在"强加因果"的逻辑风险。',ans:'正确',tag:'因果谬误+社会科学方法',analysis:'仅凭时间先后无法排除其他原因，符合原文"一切会影响现象的因子都要充分考虑"的要求。同期可能存在其他促进经济增长的因素，相关不等于因果。'},
{id:115,cat:'综合',lv:2,type:'choice',stem:'【概念辨析+论证】\n"文章要有新意"与"文章不能背离党的路线方针政策"，这两个要求是否矛盾？原文的回答是？',opts:['A. 两者矛盾，需要选择其一','B. 不矛盾，"新意"是在坚守根本立场前提下的思想深化和表达创新','C. 两者相同，坚守立场本身就是最大的新意','D. 矛盾，但可以灵活变通'],ans:'B',tag:'概念关系辨析',analysis:'原文说新意"不是要去刻意求新，更不能背离马克思主义立场"，说明两者不矛盾，新意是在边界内的创新，B准确。'},
{id:116,cat:'综合',lv:2,type:'judge',stem:'【综合判断】\n某海洋政策研究者说："构建海洋命运共同体，首先要解决地区争端，然后才能推进到全球治理。"根据原文，这一说法是否准确？\n\n判断：这一说法准确复述了原文的路径设计。',ans:'错误',tag:'论证结构误读',analysis:'原文说全球、地区和双边三个层面应"着眼于不同的路径"，三者并列同时推进，不存在"先地区后全球"的时间顺序，该说法将并列结构误读为时间顺序。'},
{id:117,cat:'综合',lv:2,type:'choice',stem:'【多文本综合+概念】\n习近平文风论强调文章要"实"，陈望道修辞学强调消极修辞要"明白"。两者的共同指向是？',opts:['A. 文章越短越好','B. 表达应服务于准确传递内容，避免形式干扰实质','C. 所有文章都应使用白话文','D. 修辞学比内容更重要'],ans:'B',tag:'多文本概念综合',analysis:'"实"要求内容真实贴近实际，"明白"要求语言不分散注意力，两者共同指向"表达形式应服务于内容传递"，B准确提炼了共同本质。'},
{id:118,cat:'综合',lv:2,type:'judge',stem:'【论证+概念】\n某人认为："远读"和"细读"是对立的，数字人文应该完全放弃细读，只使用计算机处理文本。\n\n判断：这一观点符合原文立场。',ans:'错误',tag:'概念对立关系误判',analysis:'原文明确"人的阅读不可替代"，"对远读结果的解读，仍然依赖学者在细读基础上建立的认知"。远读和细读是互补关系，而非对立替代关系。'},
{id:119,cat:'综合',lv:2,type:'choice',stem:'【综合推断】\n某文章说"藜麦种植面积增长了两倍多……价格不太可能再度回升"。这句话表达的是？',opts:['A. 藜麦农民未来将彻底贫困','B. 供给持续扩大导致价格下行压力，这对农民是不利的结果','C. 藜麦在全球的需求将消失','D. 停止种植藜麦对农民有利'],ans:'B',tag:'经济逻辑+文本推断',analysis:'供给大幅增加而需求不能同比增长→价格下降，这对依赖价格收入的农民不利。原文称之为"令人悲伤的结局"，B准确，A过度推断，C、D无依据。'},
{id:120,cat:'综合',lv:2,type:'judge',stem:'【论证结构+概念】\n某文章关于"深时"的论证结构是：先介绍地下世界奇观→再解释深时的定义→再提出两种心理反应→最后主张积极行动。\n\n判断：这是一个"现象引入→概念界定→问题分析→立场主张"的论证结构。',ans:'正确',tag:'论证结构整体把握',analysis:'文章依次：描述地下探险体验引入→定义"深时"→分析两种人的反应→倡导激进行动立场，符合"现象→概念→分析→主张"的论证推进方式。'},
{id:121,cat:'综合',lv:2,type:'choice',stem:'【概念+论据】\n根据原文，"人工栽培植物频繁使用农药"这一现象，最根本的原因是？',opts:['A. 现代农业追求高产','B. 病虫害越来越难以控制','C. 人工栽培植物在育种过程中失去了地面和地下的沟通能力，无法自我防御','D. 化学农药成本降低'],ans:'C',tag:'因果链追溯',analysis:'原文明确因果链："人工栽培植物失去沟通能力→特别容易成为昆虫猎物→这是必须使用农药的原因之一"，C直接对应原文因果链起点。'},
{id:122,cat:'综合',lv:2,type:'judge',stem:'【论证+谬误】\n某文章论点是"消极修辞要求语言平稳传达"。据此有人推论："演讲应该语气平淡，避免任何情感起伏。"\n\n判断：这一推论正确应用了消极修辞概念。',ans:'错误',tag:'概念过度应用',analysis:'"平稳传达"指语言组织上的平衡完整，不是要求情感中性。将修辞技术要求误读为情感表达要求，是概念内涵的误用。'},
{id:123,cat:'综合',lv:2,type:'choice',stem:'【综合评估】\n某人批评《中国目录学史》说："该书忽今忽古，时间顺序混乱，这是根本性缺陷，削弱了该书的学术价值。"对此最有力的反驳是？',opts:['A. 姚名达已经意识到这个问题并选择接受','B. "忽今忽古"是主题分述法的必然结果，但作者通过"依史之所宜，采多样之体例"将弊端控制在可接受范围，且这种安排有其学术价值','C. 时间顺序不重要','D. 读者可以自己整理时间顺序'],ans:'B',tag:'论证反驳评估',analysis:'最有力的反驳需要承认问题存在，但说明为何不是"根本性缺陷"——作者有意识地通过多样体例弥补，且主题纵贯的价值超过了时序混乱的代价。B做到了这一点。'},
{id:124,cat:'综合',lv:2,type:'judge',stem:'【概念+论证】\n某研究说"嫦娥四号"月背着陆是"中国航天的首个世界第一"，某人据此推论"中国此前从未在航天领域取得过重大成就"。\n\n判断：该推论成立。',ans:'错误',tag:'以偏概全+概念边界',analysis:'"首个世界第一"是指"月背软着陆"这一具体成就，不意味着此前无任何重大成就，推论以偏概全。'},
{id:125,cat:'综合',lv:2,type:'choice',stem:'【论证+概念综合】\n关于"证经补史"的局限性，原文的核心批评是什么？',opts:['A. 这一思路效率太低，浪费了大量考古资源','B. 这一思路限制了考古学视野，使考古学从属于文献框架，无法发挥独立的历史构建能力','C. 三皇五帝是神话，不值得用考古去证明','D. 这一思路只适用于古代中国，不适用于其他文明'],ans:'B',tag:'批评核心把握',analysis:'原文说"证经补史"的传统"影响了中国考古学的视野和思维方式，限制了考古学在重构中国上古史中的作用"，B准确提炼了这一批评的核心。'},
{id:126,cat:'综合',lv:2,type:'judge',stem:'【元认知考察】\n某教师说："高考信息类文本考察的核心是阅读速度和词汇量。"\n\n判断：这一说法全面概括了该题型的核心考察内容。',ans:'错误',tag:'元认知考察',analysis:'高考信息类文本的核心考察是精确的文本信息比对、论证结构识别、谬误辨别和概念把握。阅读速度和词汇量是基础条件，不是核心区分能力。'},
{id:127,cat:'综合',lv:2,type:'choice',stem:'【多重论据评估】\n某文章通过三个层面（梁、柱、整体结构）论证"偷梁换柱加固方法的科学性"，三个层面的论据是否可以互相替代？',opts:['A. 可以，任何一个层面的论据足以证明整体科学性','B. 不可以，三个层面各自针对不同的稳定性要素，缺少任何一个都会使论证不完整','C. 可以，因为梁和柱的稳定性必然导致整体稳定','D. 不确定，需要更多证据'],ans:'B',tag:'论证完整性',analysis:'梁的水平稳定、柱的承载传力、整体结构在过渡阶段的稳定是三个独立的证明维度，分别回应可能的不同质疑，缺少任何一个都存在论证漏洞，选B。'},
{id:128,cat:'综合',lv:2,type:'judge',stem:'【概念+论证】\n某文章说"施肥不若淡而次数多为妙"。某人推论：肥料的总量越少越好，甚至不施肥最佳。\n\n判断：推论符合原文。',ans:'错误',tag:'概念边界+结论过度',analysis:'"淡而次数多"是针对"过度施肥"的风险提示，并非绝对不施肥。原文说施肥要"淡而次数多"，意味着施肥是必要的，只是要控制单次浓度。'},
{id:129,cat:'综合',lv:2,type:'choice',stem:'【论证方法辨析】\n某文章同时使用了"类比论证"和"举例论证"。下列哪组例子准确区分了两种方法？',opts:['A. 类比：以武松大闹快活林说明流动视角；举例：以《水浒传》说明中国叙事传统','B. 类比：以人闭塞口鼻比喻植物枝干深埋；举例：以金合欢树说明气味沟通','C. 类比：以《阅微草堂笔记》说明复眼视角；举例：以杜甫诗说明文学史稳定性','D. 两种方法无法区分'],ans:'B',tag:'论证方法辨析',analysis:'类比论证：从已知领域（人的窒息）推类比未知领域（植物枝干）；举例论证：直接引用事实（金合欢树的气味警报）作为证据。B准确区分了两者，A、C中均是举例而非类比。'},
{id:130,cat:'综合',lv:2,type:'judge',stem:'【概念对比推断】\n"消极修辞"与"积极修辞"的区别，根据原文语境，最可能是：前者追求明白平实，后者追求文采表现力。\n\n判断：这一推断合理。',ans:'正确',tag:'概念对比推断',analysis:'原文只详述消极修辞，说其以"明白"为目标，使用"概念、抽象、普通、质实"的语言；对应地，积极修辞应追求感性具体、华丽表现，这一推断合理且符合修辞学通识。'},
{id:131,cat:'综合',lv:2,type:'choice',stem:'【谬误+论证】\n某人论证"中国考古学应继续走证经补史路线"，理由是"三皇五帝有深厚的文化传承价值，考古学应该为文化自信服务"。这一论证的主要逻辑问题是？',opts:['A. 诉诸情感代替了学术论证，文化价值不等于考古方法的正确性','B. 以偏概全','C. 偷换概念','D. 无中生有'],ans:'A',tag:'诉诸无关因素',analysis:'文化传承的价值不能证明该方法在学术上是最优路径，用文化价值代替方法论论证是诉诸无关因素。'},
{id:132,cat:'综合',lv:2,type:'judge',stem:'【因果论证评估】\n某文章说，藜麦消费量早在价格大涨之前就已在缓慢下降，因此价格上涨不是消费量下降的原因。\n\n判断：这一论证逻辑成立。',ans:'正确',tag:'因果论证评估',analysis:'如果消费量在价格上涨前就已下降，说明下降趋势独立于价格变化，打断了"价格涨→消费降"的因果链。时间顺序（原因须先于结果）是有效的因果检验方法，论证成立。'},
{id:133,cat:'综合',lv:2,type:'choice',stem:'【表面矛盾的统一】\n某文章说"能够用短小篇幅阐明的道理绝不绕弯子"，同时又说"有内容有见解的长文章，人们也是喜欢读的"。这两句话是否矛盾？',opts:['A. 矛盾，前后说法不一致','B. 不矛盾，两者共同支撑"内容决定形式，宜短则短宜长则长"的核心主张','C. 第二句是对第一句的否定','D. 两句话各自独立，无逻辑关联'],ans:'B',tag:'表面矛盾的统一',analysis:'两句话分别针对"无效拖长"和"有实质内容的长文"，共同揭示"形式服务内容"的原则，是论证中的"辩证补充"结构，选B。'},
{id:134,cat:'综合',lv:2,type:'judge',stem:'【概念应用过度】\n某人说："根据流动视角理论，《红楼梦》中全知视角的叙述属于西方式的定点透视，与中国传统叙事不符。"\n\n判断：这一推论符合原文立场。',ans:'错误',tag:'概念应用过度',analysis:'原文说中国传统叙事"往往"采取流动视角，不排除其他视角的存在。用"流动视角"否定《红楼梦》的某些段落是以偏概全。'},
{id:135,cat:'综合',lv:2,type:'choice',stem:'【论据功能链条】\n某文章说"战争的伟力之最深厚的根源，存在于民众之中"。这一论据在整体论证中起什么作用？',opts:['A. 论证"武器比人力更重要"','B. 支撑"力量对比包括人力和人心对比"，进而支撑"中国通过持久战可以实现优势转化"','C. 批评日本低估了中国民众的力量','D. 说明中国军队战斗力强'],ans:'B',tag:'论据功能链条',analysis:'这句话是人民战争理论的核心表述，功能是：民众力量是决定性的→中国民众支持抗战→这是中国优势的来源→持久战可以取胜。B准确描述了论据的论证功能链。'},
{id:136,cat:'综合',lv:2,type:'judge',stem:'【概念内涵扩大】\n某人认为：费孝通强调"研究者要站在被调查者利益上"，这意味着研究者不能发表任何对被调查群体不利的研究结论。\n\n判断：这一推论符合原文意思。',ans:'错误',tag:'概念内涵扩大',analysis:'"站在被调查者利益上"是研究态度和出发点的要求，意在获得真实合作，不是要求研究结论必须对被调查者有利。'},
{id:137,cat:'综合',lv:2,type:'choice',stem:'【概念细微差异辨析】\n某文章说"柳宗元《种树郭橐驼传》认为种树后不再管它，任其自然生长"，另一文章说"种树后要多注意、少干涉"。某人认为两者完全相同，没有区别。该判断有何问题？',opts:['A. "不再管它"与"多注意、少干涉"有本质区别：前者主张完全放任，后者要求持续关注但避免过度干预','B. 两者确实相同，该判断没有问题','C. 柳宗元的说法更科学','D. 两者的区别在于树的种类不同'],ans:'A',tag:'概念细微差异辨析',analysis:'"勿动勿虑，去不复顾"（柳）是彻底放任；"多注意、少干涉"（花经）要求时时留意害虫风雨等，只是不过度干涉。两者在"是否持续关注"上有本质区别。'},
{id:138,cat:'综合',lv:2,type:'judge',stem:'【论证结构评价】\n某文章的论证结构是："先提出问题→给出三个原则（短实新）→逐一论证→补充说明例外情况"。\n\n判断：这种"主张+论证+补充说明"的结构，体现了论证的辩证性和严谨性。',ans:'正确',tag:'论证结构评价',analysis:'对可能的反例或例外进行补充说明，是防止论点被轻易反驳的有效做法，体现了论证的辩证思维，判断正确。'},
{id:139,cat:'综合',lv:2,type:'choice',stem:'【概念批评对象识别】\n根据原文，"调查研究要坚持结论产生在调查研究之后"是在批评哪种具体行为？',opts:['A. 调查人员写报告速度太慢','B. 调查人员提前确定好调查结论，再寻找支持该结论的材料（带着调子下去）','C. 调查人员不尊重被调查者','D. 调查报告的格式不规范'],ans:'B',tag:'概念批评对象识别',analysis:'原文明确："不能带着事先定的调子下去，而要坚持结论产生在调查研究之后"，批评的正是先有结论再找证据的研究方式。'},
{id:140,cat:'综合',lv:2,type:'judge',stem:'【因果链反向推断】\n"气压降低→土壤无法吸附毛细水→水回流溪流→洪涝风险增大"，这是原文的因果链条。\n\n判断：根据这一因果链，气压升高应该对应洪涝风险降低。',ans:'正确',tag:'因果链反向推断',analysis:'根据原文逻辑链的方向性：气压高→土壤吸附能力强→更多水滞留土壤→溪流水量减少→洪涝风险降低。这是对因果链的合理正向推断，判断正确。'},
{id:141,cat:'综合',lv:2,type:'choice',stem:'【作者立场综合判断】\n某人说："数字人文的最终目标是用计算机完全取代人类的文学研究。"原文对此持什么立场？',opts:['A. 支持，计算机比人类更客观','B. 反对，计算机不能理解文本内容，人的阅读不可替代，远读与细读互补','C. 中立，认为两种研究方式各有优劣','D. 支持，但仅限于量化研究领域'],ans:'B',tag:'作者立场综合判断',analysis:'原文明确："人的阅读不可替代""对远读结果的解读，仍然依赖学者的细读认知"，数字人文是补充工具而非替代，选B。'},
{id:142,cat:'综合',lv:2,type:'judge',stem:'【谬误类型识别】\n某篇高考题的错误选项说："问八的回答和问十五的回答，可作为问六所讨论的深耕理由的补充。"\n\n判断：这是一个"张冠李戴"类谬误——把后期养护的内容安到种植操作的理由上。',ans:'正确',tag:'谬误类型识别',analysis:'问六讨论"深耕"这一种植操作的理由；后续问答属于后期养护，与"深耕理由"属于不同论证层次，将两者关联是典型的张冠李戴。'},
{id:143,cat:'综合',lv:2,type:'choice',stem:'【论证方法综合评价】\n关于《论持久战》的论证，下列哪项评价最准确？',opts:['A. 主要依靠情感号召，缺乏逻辑论证','B. 综合运用了演绎推理（从"人是决定因素"推出"中国能取胜"）、类比（国际形势对比）和反驳对立观点等多种论证方法','C. 只使用了举例论证，缺乏理论深度','D. 论证过于复杂，普通读者难以理解'],ans:'B',tag:'论证方法综合评价',analysis:'《论持久战》使用了演绎（人力决定论→中国有优势）、归纳（分析各方面因素）、反问（修辞手法加强论证）、反驳（批评唯武器论），B准确描述了其多元论证方法。'},
{id:144,cat:'综合',lv:2,type:'judge',stem:'【谬误识别应用】\n某学生在写议论文时，引用了一个名人名言作为论据，但该名言只是在情感上有感染力，与论点并无直接逻辑联系。\n\n判断：这属于"诉诸权威/情感，论据与论点无直接逻辑关联"的谬误。',ans:'正确',tag:'谬误识别应用',analysis:'论据必须与论点有直接的逻辑关联，名人权威或情感感染力不能替代逻辑联系，属于诉诸权威/诉诸情感谬误。'},
{id:145,cat:'综合',lv:2,type:'choice',stem:'【元认知：难题识别】\n根据高考信息类文本题目的命题规律，下列哪类错误选项最难被识别？',opts:['A. 完全无中生有，添加原文根本未提及的内容','B. 将原文"可能"改为"必然"','C. 用与原文几乎相同的词语，但通过替换指代对象或比较标准，造成逻辑偏移','D. 将两个不相关的句子强行拼接'],ans:'C',tag:'元认知：难题识别',analysis:'C类错项（偷换指代/概念）最具迷惑性，因为表面词语与原文高度相似，学生依赖记忆性比对容易放过，只有逐字核查指代对象和逻辑关系才能识破。A、B、D相对明显。'},
{id:146,cat:'综合',lv:2,type:'judge',stem:'【必要条件与充分条件】\n某文章论证"袁枚是清代前半叶出现的美食家群体中的代表"，论据是"特殊的时代背景使饮食之人不再被轻贱"。\n\n判断：该论据充分解释了袁枚出现的必要条件。',ans:'正确',tag:'必要条件与充分条件',analysis:'时代背景是袁枚能以美食家身份被接受的必要条件（没有这个条件就不会出现）。作为必要条件分析，判断正确。'},
{id:147,cat:'综合',lv:2,type:'choice',stem:'【概念关系辨析】\n下列关于"弯月面"和"毛细作用"的关系，最准确的描述是？',opts:['A. 毛细作用导致弯月面的形成','B. 弯月面是水受玻璃吸引的结果；毛细作用是水受物体表面吸引和自身吸引力共同作用在细管中上升的现象——两者都源于水对物体表面的吸引力','C. 两者完全无关','D. 弯月面包含毛细作用'],ans:'B',tag:'概念关系辨析',analysis:'弯月面和毛细作用都源于"水对物体表面的吸引力"这一共同机制，是同一基本物理性质在不同条件下的表现，B准确描述了两者的关系。'},
{id:148,cat:'综合',lv:2,type:'judge',stem:'【元认知：题型区分】\n某分析说："高考信息类文本第一题（理解分析题）和第二题（论证分析题）的核心区别在于：前者考察是否读懂了原文内容，后者考察是否理解了内容与论证目的的关系。"\n\n判断：这一概括基本准确。',ans:'正确',tag:'元认知：题型区分',analysis:'第一题通常考察信息理解和细节把握；第二题关注"为何用此论据""这段论证目的是什么"等论证层面的问题。这一区分基本准确，有助于定向训练。'},
{id:149,cat:'综合',lv:2,type:'choice',stem:'【反证逻辑】\n如果要反驳"人工栽培植物失去沟通能力"这一说法，最有力的证据类型是？',opts:['A. 找到一种人工栽培植物，证明它仍能通过气味或根部信号与其他植物沟通','B. 说明人工栽培植物产量很高','C. 说明野生植物也有失去沟通能力的情况','D. 引用权威农业专家的不同意见'],ans:'A',tag:'反证逻辑',analysis:'要反驳"人工栽培植物（多数）失去沟通能力"，需要找到反例——仍保有沟通能力的人工栽培植物。A是直接反驳，B、C、D均无直接逻辑效力。'},
{id:150,cat:'综合',lv:2,type:'judge',stem:'【隐含前提识别】\n某文章仅凭"《随园食单》之前的著作停留在形而下层次"就得出"《随园食单》完成了理论蜕变"。\n\n判断：这一论证需要一个隐含前提才能成立——即《随园食单》达到了理论层面，且原文提供了这一前提。',ans:'正确',tag:'隐含前提识别',analysis:'仅说"前人停留形而下"不能自动得出"随园完成了蜕变"，需要"随园达到了形而上理论层面"的前提。原文通过"须知单""戒单"等具体内容提供了这一前提，使论证完整。'},
{id:151,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n下列哪个选项最准确地描述了"论据与论点之间需要满足的核心逻辑条件"？',opts:['A. 论据必须来自权威来源','B. 论据的内容必须与论点处于同一话题领域','C. 论据必须通过明确的逻辑推理步骤支撑论点，且不能被反向解读为削弱论点','D. 论据必须是数字或统计数据'],ans:'C',tag:'逻辑条件核心',analysis:'有效论据的核心条件是：逻辑方向一致（支撑而非削弱）且推理步骤有效。A是诉诸权威，B是话题相关性（必要但不充分），D是形式要求，C最准确。'},
{id:152,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某文章论点A需要前提B和前提C才能成立。作者只论证了B，认为C是"显而易见"的常识，无需论证。\n\n判断：如果C实际上存在争议，这会构成论证的漏洞。',ans:'正确',tag:'隐含前提的风险',analysis:'将存在争议的前提当作不言而喻的常识是论证的重大漏洞——批评者可以专门质疑未被论证的C，使整个论证崩溃。'},
{id:153,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n以下四个推论，哪个犯的谬误与其他三个性质不同？',opts:['A. 原文说"深时使人类显得微不足道"→推论"所以人类的行为没有任何意义"（应用方向错误）','B. 原文说"消极修辞以明白为目标"→推论"积极修辞以不明白为目标"（对立面错误推断）','C. 原文说"水受玻璃吸引形成弯月面"→推论"所有液体都受玻璃吸引"（以偏概全）','D. 原文说"文学史框架有力量"→推论"文学史永远不会改变"（绝对化）'],ans:'C',tag:'谬误类型精细辨析',analysis:'A是应用方向与作者立场相反；B是非此即彼的错误对立；D是"程度"被绝对化。只有C是以偏概全（从特定液体推及所有液体），属于归纳范围谬误，与A、B、D的演绎类谬误性质不同。'},
{id:154,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某人批评《论持久战》说："毛泽东的论证依赖于日本会孤立的预测，但这一预测在当时并不确定，因此整个论证是不可靠的。"\n\n判断：这一批评有一定逻辑力量，但忽略了《论持久战》的论证策略是基于趋势分析而非确定预测。',ans:'正确',tag:'批评评估的两面性',analysis:'批评者的逻辑有一定道理（前提不确定削弱论证），但《论持久战》的方法是"分析趋势、建立概率性论证"而非演绎确定性，这种战略性分析方法本身是合理的，不能因不确定性而完全否定。'},
{id:155,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n以下哪个命题最完整地体现了"充分条件"与"必要条件"在结构上的区别？',opts:['A. "深耕才能让根系充分发展"——深耕是根系发展的必要条件（正确）','B. "只要浇足水，花树就能存活"——浇水是存活的充分条件（原文不支持此命题）','C. "既要深耕又要浅种，才算依法种植"——两者都是必要条件，合起来构成充分条件（正确）','D. 以上三个均能体现，只需选最全面的'],ans:'C',tag:'充分/必要条件辨析',analysis:'"既要……又要……才……"正是"多个必要条件的合取构成充分条件"的完整结构，最全面地体现了两种条件关系。A只体现必要条件，B中命题本身不符合原文，C选项结构最完整。'},
{id:156,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n"竞争性真相"机制之所以有效果，根本原因是读者倾向于接受与自己既有价值观相符的信息框架，即使对事实本身没有误解。\n\n判断：原文对此有明确或隐含的支持。',ans:'正确',tag:'机制深层解读',analysis:'原文说报道者"出于高尚理由引导消费者远离藜麦"，读者的良心危机来自于接受了"购买藜麦伤害了贫困者"的道德框架，这正是利用读者的既有价值倾向使片面真相发挥效果。'},
{id:157,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n论证"金银器史是一部古代社会风俗史"时，作者的论证路径是？',opts:['A. 金银器很贵重→贵重物品反映社会状态→社会状态即风俗','B. 金银器纹样设计的图式演变受设计者所处风俗和共享文学影响，因此金银器史记录了这些文化生态','C. 历史学家都认同金银器史就是风俗史','D. 金银器数量多，足以代表社会各个层面'],ans:'B',tag:'论证路径还原',analysis:'原文明确：纹样设计的图式演变包含"设计者和制作者共处的风俗与共享的文学所形成的文化生态"，因此金银器史"很大程度上也是一部古代社会风俗史"，B准确还原了论证路径。'},
{id:158,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某人在研究一个争议问题时，只阅读支持自己观点的文献，忽略反对意见，然后得出结论说"学界普遍支持我的观点"。\n根据调查研究原则，这违反了"不唯书、不唯上、只唯实"和"坚持结论产生在调查研究之后"的要求。\n\n判断：这一分析正确。',ans:'正确',tag:'研究原则综合应用',analysis:'选择性阅读并声称"学界普遍支持"违反了：①只唯实（只看支持自己的文献不是唯实）；②结论产生在调查之后（研究前就有了结论）。两个核心原则都被违反。'},
{id:159,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n某文章用了三段话分别从"梁的角度""柱的角度""整体结构角度"论证偷梁换柱的科学性。如果第二段（柱的角度）被删除，论证会出现什么缺陷？',opts:['A. 没有缺陷，梁和整体结构的论证已足够','B. 论证会缺少对"柱的传力稳定性"的说明，无法完整解释为什么换柱过程对整体稳定性基本无影响','C. 文章会变短，逻辑更清晰','D. 论证方向会改变'],ans:'B',tag:'论证完整性分析',analysis:'柱的角度专门解释了"假柱代替原柱的过渡机制"——这是"换柱过程对整体稳定基本无影响"的直接理由。删除后，"为什么过渡期结构仍然稳定"这一问题就缺乏解答。'},
{id:160,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某位同学做信息类文本题时，发现一个选项"说法与原文几乎相同"，因此判断为正确。\n\n判断：这种答题策略存在系统性风险。',ans:'正确',tag:'元认知：答题误区',analysis:'高考错误选项中最高难度的一类（偷换指代/比较标准）正是在表面措辞与原文高度相似的情况下进行微小逻辑偷换。"与原文几乎相同"反而是需要最仔细核查的信号，而非正确的保证。'},
{id:161,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n"文学史像一道堤坝"这一比喻，其核心类比逻辑是什么？',opts:['A. 文学史很坚硬，难以改变','B. 文学批评像水流，不断冲击；文学史像堤坝，能承受冲击但在冲击中渐变——二者在互动中共同演进','C. 文学史可以阻止所有批评','D. 文学批评是有害的，需要被控制'],ans:'B',tag:'比喻论证的核心逻辑',analysis:'堤坝的特征：能承受水流冲击（文学史有强大力量），同时在长期冲击下发生渐进变化（文学史会局部微调），水流不会淹没堤坝（批评不会彻底颠覆文学史）。B完整提取了类比的核心逻辑。'},
{id:162,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某人论证"中国持久战必将胜利"，使用的方法是：历史上以弱胜强的例子很多（如赤壁之战），所以中国能够以弱胜强。根据《论持久战》的论证方式，这一论证存在根本性缺陷——缺陷在于"类比缺乏对具体条件的分析"。\n\n判断：这一判断正确。',ans:'正确',tag:'论证方法评估',analysis:'毛泽东的论证核心是对"中日双方特定条件的深入分析"（正义性、大小、人力人心等），而非依赖历史类比。仅凭历史先例进行类比，忽略了具体条件分析，是论证的根本缺陷。'},
{id:163,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n以下四个论证，哪个在逻辑结构上最为严密？',opts:['A. 因为X是好事，所以我们应该做X（诉诸价值，无具体论证）','B. 观察到A现象→分析A的成因→提出机制M→用M解释其他相关现象B和C→得出结论','C. 权威A说了P，所以P是正确的','D. 大家都这么做，所以这样做是对的'],ans:'B',tag:'论证结构严密性',analysis:'B展示了"现象→成因→机制→应用验证→结论"的完整科学论证链，每一步都有支撑。A是诉诸价值，C是诉诸权威，D是诉诸大众，均是非形式逻辑谬误。'},
{id:164,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某文章使用类比"种植花树需要多注意、少干涉，这与现代教育理念无异"。在逻辑上，声称两者"完全相同"会使类比过强，一旦发现一个差异点就会被彻底推翻。\n\n判断：这一分析正确。',ans:'正确',tag:'类比论证的有效性边界',analysis:'声称"完全相同"使类比过强，一旦发现一个差异点就会被彻底推翻。适当的类比论证应说明"在关键方面相似"，而保留其他差异。'},
{id:165,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n"主观地和片面地看问题"——这一批评在《论持久战》中针对的是哪个具体认知错误？',opts:['A. 只看到武器因素，忽略人力人心因素','B. 只看到中日双边关系，忽略国际因素','C. 只看到当下局势，忽略历史趋势','D. 只看到军事因素，忽略外交因素'],ans:'A',tag:'批评对象精确定位',analysis:'原文在"不但看到武器，而且看到人力"之前说"这就是所谓唯武器论，是……主观地和片面地看问题的意见"，批评的正是"只看武器、忽略人力人心"的片面性。'},
{id:166,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某文章说"考古学完全有能力担当重写中国上古史的重任"。某评论者认为此句"过于自信，缺乏依据"。但原文在此句之前用了整整四段列举具体考古成就。\n\n判断：原文结论并非"过于自信，缺乏依据"，该评论本身犯了忽视已有论据的错误。',ans:'正确',tag:'论证评估的全面性',analysis:'评判一个结论是否"缺乏依据"，必须考察全文已提供的论据。原文四段详细列举了考古成就，评论者忽略这些论据直接攻击结论，是一种不全面的批评。'},
{id:167,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n在"复眼映视式视角"的分析中，三种功能分别对应视角的哪个层次？',opts:['A. 外视角→情节，内视角→深度心理，旁视角→口碑','B. 全部来自内视角','C. 情节来自作者直接叙述，其余来自人物','D. 三种功能无法对应具体视角'],ans:'A',tag:'概念层次对应',analysis:'外视角（第三人称观察）推进事件情节；内视角（人物内心）呈现意识深度；旁视角（他人评价）形成口碑效果，A准确对应了三种视角与三种功能的关系。'},
{id:168,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某人认为："根据原文，只要使用了设问和反问修辞，论证的说服力就会增强。"\n\n判断：这一概括过于绝对。',ans:'正确',tag:'修辞与逻辑关系',analysis:'设问和反问增强语气和感染力，但"说服力"还取决于论据是否充分、前提是否为真。修辞手法改善表达效果，不能自动保证论证的逻辑有效性。'},
{id:169,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n以下哪个选项最准确描述了"底线伦理"与"基准意识"在结构上的关系？',opts:['A. 两者相互独立，适用于不同人群','B. 底线伦理（否定性规范：不能做什么）是最低要求，基准意识（肯定性规范：积极应该做什么）是更高要求，两者共同构成完整的文明网络行为观','C. 基准意识包含底线伦理','D. 底线伦理比基准意识更重要'],ans:'B',tag:'概念层级关系',analysis:'原文结构：先讲底线伦理（否定性的"五不"），再说"一旦有了行为，就有了肯定意义上的网络行为意识"（基准意识），两者是层次递进的两个维度，B准确。'},
{id:170,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某人论证"深耕是种树最重要的步骤"，理由是"根是花树发达的核心（原文有据），深耕保证了根的发育空间（原文有据）"。\n\n判断：这一两步推理的逻辑结构完整，且两个步骤都在原文中有明确支撑。',ans:'正确',tag:'多步推理链条验证',analysis:'第一步"根是核心"：原文"花树发达与否，全靠乎根"，成立；第二步"深耕保证根的发育空间"：原文"倘使仅掘至应种之下而止，则根须不易发展"，成立。两步推理均有依据，结构完整。'},
{id:171,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n某评论者说："《随园食单》之所以伟大，是因为袁枚的个人才华无与伦比，而非时代条件所致。"根据原文的论证逻辑，这一评论的主要问题是？',opts:['A. 低估了袁枚的才华','B. 忽略了原文明确论证的"时代背景使美食家出现"这一结构性条件，将个人才华与时代条件对立','C. 夸大了《随园食单》的影响','D. 未考虑饮食技术的进步'],ans:'B',tag:'个人才华vs结构条件',analysis:'原文说"特殊的时代背景使饮食之人不再被轻贱，于是一大批美食家应运而生"——时代条件是袁枚出现的结构性前提。评论将个人才华与时代条件对立，忽略了原文的核心论证。'},
{id:172,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某文章的论证存在"循环论证"结构：用"A是真的"来支撑"B是真的"，而在其他地方又用"B是真的"来支撑"A是真的"。\n\n判断：这种论证结构在形式上成立，但在逻辑上没有增加任何信息量，是一种有效但不充分的论证策略。',ans:'错误',tag:'循环论证识别',analysis:'循环论证（begging the question）在逻辑上是无效的——它没有提供独立的支撑，只是重复声明。判断说"形式上成立"是错的，循环论证在形式逻辑上也不成立，因为它不是有效推理。'},
{id:173,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n某考生总结了一套答题策略："每道选项都找关键词，与原文关键词对照，有一个关键词不同就判断为错。"这个策略的根本缺陷是？',opts:['A. 太耗时，不实用','B. 关键词相同不代表逻辑关系相同——偷换指代、比较标准、因果关系等谬误往往在保留关键词的情况下改变逻辑结构','C. 关键词不好找','D. 这个策略其实没有缺陷'],ans:'B',tag:'元认知：方法局限性',analysis:'最难的错误选项恰恰保留了原文关键词，而在"这样"的指代、"更加"的比较对象、"因为"的因果关系等逻辑结构上做手脚。纯关键词匹配策略会在最难题上失效。'},
{id:174,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n"等效意识"要求对线上线下行为提出同等的道德规范要求，而"反身意识"要求换位思考，感受他人受到伤害时的体验。\n\n判断：可以说，等效意识解决"行为的评价标准"问题，反身意识解决"行为者的共情能力"问题。',ans:'正确',tag:'概念功能精确区分',analysis:'等效意识：统一线上线下的道德标准（评价维度）；反身意识：设想自己是受害者时的感受（共情维度）。两个功能维度的区分准确。'},
{id:175,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n某人阅读"树木通过气味和根部信号沟通"的文章后说："所以植物是有意识的，它们会思考。"这个推论犯了什么错误？',opts:['A. 以偏概全','B. 概念扩张：将"信息传递行为"扩张为"有意识的思考"，跨越了未被论证的概念边界','C. 因果倒置','D. 无中生有'],ans:'B',tag:'概念边界跨越',analysis:'原文描述的是信号传递的生理/化学机制，并未涉及"意识"这一更高层次的概念。从"能传递信号"直接跳到"有意识"是概念的非法扩张，越过了原文完全未论证的概念边界。'},
{id:176,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某文章提出"四个转变"作为海洋发展路径。某人认为这四个转变是递进关系：先实现质量效益转变，再实现循环利用转变，依此类推。\n\n判断：原文支持这一顺序递进的解读。',ans:'错误',tag:'并列关系误读为递进',analysis:'原文用"要……着力……""要……着力……"的并列句式列举四个转变，没有表示时间顺序或逻辑优先级的标志词。四个转变是并列的政策方向，而非有先后顺序的步骤。'},
{id:177,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n某辩论选手想反驳"人工栽培植物需要大量农药"这一观点。以下哪种反驳策略最有逻辑力量？',opts:['A. 说明野生植物也有生病的时候','B. 找出一种不需要大量农药的人工栽培植物作为反例，同时说明其仍保有沟通能力','C. 引用农业专家说农药用量没有那么多','D. 说明农药对人体无害所以这个问题不重要'],ans:'B',tag:'反驳策略最优选',analysis:'B同时做到了：①提供反例（存在不需要大量农药的人工植物）直接反驳普遍性主张；②说明机制（保有沟通能力）解释为何不需要农药，是最完整的逻辑反驳。'},
{id:178,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n在费孝通的社会调查理论中，"客观性"的含义与自然科学中的"客观性"有根本区别——自然科学的客观性可以通过隔离观察者与观察对象来实现，而社会科学的客观性要求正视并处理好观察者与被观察者的关系，而非试图消除这种关系。\n\n判断：这一说法正确。',ans:'正确',tag:'学科方法论差异',analysis:'原文批评"客观"的空洞概念，指出调查者必然与被调查者有人事关系，试图"没有关系"是不可能的，真正的客观是在承认关系存在的前提下科学处理它，这与自然科学的隔离式客观性有本质区别。'},
{id:179,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n某教师对学生说："你们做信息类文本题的时候，要怀疑一切选项，把每个选项都当作可能是错的。"这一建议的价值和局限性分别是什么？',opts:['A. 价值：防止先入为主；局限：会使答题效率极低，因为有些选项确实明显正确，过度怀疑浪费时间','B. 价值和局限都没有，建议完全正确','C. 只有局限，没有价值','D. 这种建议适合所有考试题型'],ans:'A',tag:'批判性思维的度',analysis:'怀疑立场有助于防止"与原文相似就判断为正确"的错误；但对所有选项都保持最高怀疑度会造成时间浪费。最优策略是对"几乎正确"的选项（偷换型）保持高度怀疑，对明显错误的选项快速排除。'},
{id:180,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某人认为：《论持久战》论证中，反问句的功能是"向读者展示作者的自信，而非提供论据"。\n\n判断：这一分析部分正确——反问句确实增强语气和自信感，但它同时也在逻辑层面起到"通过否定反面命题来加强正面主张"的功能。',ans:'正确',tag:'修辞与逻辑的双重功能',analysis:'反问句在修辞上表达确信，在逻辑上等同于否定反面命题（"难道中国也不能变成优势吗"等于肯定"中国必然能变成优势"），两者同时发挥。'},
{id:181,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n"数字人文不仅是新的手段和方法，更重要的是，它赋予我们提出新问题的能力。"这句话中的逻辑关系是？',opts:['A. 并列：手段和提问能力是平等的两个维度','B. 递进：从"工具性价值"升级到"认识论价值"——改变了什么问题可以被提出的边界','C. 转折：放弃了手段层面的主张','D. 因果：因为是新手段，所以能提新问题'],ans:'B',tag:'递进逻辑识别',analysis:'"不仅……更重要的是"是明确的递进标志，从"工具价值"（手段和方法）递进到"认识价值"（能提出哪些新问题），后者涉及对研究边界的重新定义，是更深层次的价值，选B。'},
{id:182,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n批评甲："《中国目录学史》的主题分述法导致时间混乱，这是该书的严重缺陷。"\n批评乙："主题分述法的时间混乱问题，在某些主题中可能比在其他主题中更加突出，需要具体分析其对读者理解的实际影响。"\n\n判断：批评乙比批评甲更有逻辑力量。',ans:'正确',tag:'批评质量比较',analysis:'甲是全称否定判断，缺乏条件区分；乙承认问题存在，但指出需要具体分析其影响程度，避免了以偏概全，体现了辩证分析，逻辑更严密。'},
{id:183,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n某段论证："由于A导致B，B导致C，所以A导致C。"这是合法的推理链条，前提是？',opts:['A. A、B、C都是客观事实','B. 每一步的因果关系都是充分且稳定的，且没有其他因素截断因果链','C. 该推理有权威来源支持','D. 推理涉及的时间跨度不太长'],ans:'B',tag:'因果链条有效性条件',analysis:'因果链条（A→B→C）要成立，需要每一步因果关系都是充分的且没有其他干扰因素截断。B准确描述了这一条件，A是事实性要求但不充分，C、D不相关。'},
{id:184,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某文章说"柳宗元《种树郭橐驼传》的写作目的是借种树之道说明政令频出的危害"。某人认为："既然目的是政治批评，那文章中关于种树的所有技术性描述都只是比喻，不含实际的园艺知识。"\n\n判断：这一推论在逻辑上存在问题。',ans:'正确',tag:'手段与目的的关系',analysis:'写作目的是政治批评，但这不排除文中种树描述具有实际知识内容。类比论证的有效性通常依赖于类比的真实性，目的不能决定手段（种树描述）是否含实质内容。'},
{id:185,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n某人阅读"海洋命运共同体"文章后，总结说："文章的核心逻辑是：海洋是共同的→要共同管理→需要建立制度→实现和平繁荣。"这个总结是否准确？',opts:['A. 准确，这是文章的主要论证链','B. 过于简化，文章还包含对不同层面（全球/地区/双边）路径的具体分析，这些差异化路径是论证的重要组成部分','C. 完全错误，文章没有谈制度建设','D. 准确，但遗漏了海洋安全的部分'],ans:'B',tag:'论证结构完整性评估',analysis:'总结抓住了主干逻辑，但"不同层面的差异化路径"是文章的核心内容（后两段），简化后丢失了"为何要分层"以及"各层如何具体操作"的关键论证，B指出了这一遗漏。'},
{id:186,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某文章说"柳宗元《种树郭橐驼传》的写作目的是借种树之道说明政令频出的危害"。某人认为："既然目的是政治批评，那文章中关于种树的所有技术性描述都只是比喻，不含实际的园艺知识。"\n\n判断：这一推论在逻辑上存在问题。',ans:'正确',tag:'目的推论的局限',analysis:'写作目的是政治批评，但这不排除文中种树描述具有实际知识内容。目的不能限定内容的真实性，两者可以并存。'},
{id:187,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n以下哪种情况最能说明"论据的相关性"与"论据的充分性"的区别？',opts:['A. 一个论据既相关又充分，所以两个概念没有区别','B. "浇灌要在热气消散后进行"（相关：确实是浇灌注意事项；不充分：它不能单独证明"炎夏每日浇灌会导致根部腐烂"）','C. 一个完全不相关的论据','D. 相关性和充分性都是主观判断'],ans:'B',tag:'论据评估标准区分',analysis:'B完美展示了区别：论据与论点话题相关（都是关于浇灌的），但单独这一条不足以支撑特定结论，说明相关≠充分。'},
{id:188,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某人总结说："所有高考信息类文本的错误选项，本质上都是不同形式的与原文不符。"\n\n判断：这一总结虽然字面上正确，但作为分析框架价值有限——因为它没有区分不同的"不符"方式（无中生有 vs 偷换概念 vs 因果倒置等），而不同方式需要不同的识别策略。',ans:'正确',tag:'分析框架的精细度',analysis:'说"不符"是对的，但理解"如何不符"才有训练价值。无中生有靠"找原文出处"识别；偷换概念靠"核查指代和比较标准"；因果错误靠"追溯原文因果链"。没有细分的框架无法指导针对性练习。'},
{id:189,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n某文章说"人类共同财产原则……保障公海只用于和平目的"。某人据此推论"接受这一原则的国家将不能在公海进行任何军事活动"。这一推论的主要问题是？',opts:['A. 夸大了原则的法律效力，且将"目标"误读为"现实约束"','B. 以偏概全','C. 偷换概念','D. 无中生有'],ans:'A',tag:'规范性主张vs实然约束',analysis:'"保障公海只用于和平目的"是原则的目标，不是当前已具法律强制力的规则，且实际海洋法允许特定军事活动。推论将规范性目标当成了当前可执行的绝对约束，夸大了原则的效力。'},
{id:190,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某评论说："《论持久战》之所以伟大，在于它预测了正确的战争结局。"\n\n判断：这一评价不够准确，核心价值应在于其科学的分析方法和战略框架，而非仅仅是结局预测的准确性。',ans:'正确',tag:'价值判断的准确性',analysis:'原文强调中共持久战战略价值在于"对与战争相关的一切复杂因素进行深刻分析""对战争不同阶段有完整科学分析"——这是方法论价值。仅以"预测准确"定义其价值，忽略了分析框架本身的战略指导意义。'},
{id:191,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n某文章同时具有描述性和规范性两个层面。下列哪对命题准确区分了这两个层面？',opts:['A. 描述：藜麦消费量下降了34%；规范：消费者应该停止购买藜麦','B. 描述：远读在统计上有优势；规范：应当使用远读而非细读','C. 描述：中国考古学取得了巨大成就；规范：应继续推进考古学研究','D. 以上三组都正确地区分了两个层面'],ans:'D',tag:'描述vs规范的区分',analysis:'三组都包含一个描述性命题（陈述事实/现状）和一个规范性命题（应当如何），区分标准统一：有"是"字的描述状态，有"应该/应当"的规定行为，D正确。'},
{id:192,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某人论证"袁枚的《随园食单》是中国饮食文化史上最重要的著作，因为它的影响最为深远"，论据是"在袁枚和《随园食单》之后，帮口菜渐渐发达，四大菜系逐渐成形"。\n\n判断：这一论证存在"以果证因"（事后归因）的风险，因为后来的发展不能仅凭时间先后就归因于《随园食单》。',ans:'正确',tag:'以果证因的局限性',analysis:'四大菜系的形成有多种因素，若只凭时间顺序就将其归因于《随园食单》，忽略了其他可能的影响因素，存在"事后归因"（post hoc）谬误。'},
{id:193,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n以下哪个选项最好地说明了"概念的外延"与"概念的内涵"的区别，并举出了来自本题集素材的例子？',opts:['A. 外延是概念所指的范围，内涵是概念的本质特征。例："流动视角"的内涵是"叙事者带领读者与人物采取同一视角"，外延是所有采用此方法的文学作品','B. 外延指概念的定义，内涵指概念的用法','C. 两者没有区别，只是叫法不同','D. 外延指抽象概念，内涵指具体概念'],ans:'A',tag:'逻辑基本概念',analysis:'内涵：概念的本质规定（什么是流动视角）；外延：满足该规定的对象的集合（哪些作品是例子）。A使用了来自素材的例子，准确区分了两者，选A。'},
{id:194,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某人做题时发现，某选项说"原文认为A导致B"，而原文实际说"B的可能原因包括A"。\n\n判断：这两种表述有本质区别——前者断言A是唯一或主要原因，后者只是将A列为诸多可能因素之一。',ans:'正确',tag:'因果强度辨析',analysis:'"A导致B"暗示必然/主要因果关系；"可能原因包括A"表示A是充分但非唯一的可能，还存在其他原因，不确定性更高。两种表述在逻辑强度上有本质区别。'},
{id:195,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n以下四种"削弱论点"的策略，哪种在逻辑上最直接有效？',opts:['A. 质疑论点提出者的动机','B. 指出结论使用的关键概念存在歧义，使论证的逻辑基础不稳定','C. 提供一个直接与结论矛盾的可靠事实','D. 说明论证只引用了部分数据'],ans:'C',tag:'削弱策略有效性比较',analysis:'C（提供反例/矛盾事实）是最直接的反驳——如果结论是"所有X都是Y"，找到一个X不是Y的案例就可以将结论推翻。A是人身攻击谬误，B和D是间接削弱，效力不如C直接。'},
{id:196,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某文章说："地下世界牢牢保守着它的秘密，直到最近二十年，生态学家才追踪到林地土壤中的真菌网络。"某人据此推论："人类对地下世界的科学认知在最近二十年内增长了99%以上。"\n\n判断：该推论属于无中生有，原文只说最近二十年有重要发现，未提供任何关于认知增长百分比的依据。',ans:'正确',tag:'无中生有+数量化推断',analysis:'原文只描述了一个具体发现，从"有重要发现"到"认知增长99%"需要大量未提供的数据和前提，推论将定性描述转化为无据可查的定量声明，是无中生有。'},
{id:197,cat:'综合',lv:3,type:'choice',stem:'【挑战】\n以下哪个命题在逻辑形式上与"只有A，才能B"（A是B的必要条件）完全等价？',opts:['A. 如果B，那么A（B→A）','B. 如果A，那么B（A→B）','C. A和B同时成立','D. A或B至少一个成立'],ans:'A',tag:'必要条件的逻辑等价',analysis:'"只有A才能B"等价于"如果有B，则必有A"（即B→A），因为A是B的必要条件，B的存在以A为前提。注意：A→B是充分条件的表达，两者不同。'},
{id:198,cat:'综合',lv:3,type:'judge',stem:'【挑战】\n某人反驳《论持久战》说："如果人民的力量才是决定性的，那只要有人民支持，任何国家都可以打败任何对手，这显然荒谬。"\n\n判断：这一反驳使用了归谬法，且有效地质疑了原文论点。',ans:'错误',tag:'归谬法有效性评估',analysis:'该反驳确实使用了归谬法（推导出"荒谬"结论），但它反驳的不是原文的真实论点，而是一个被过度字面化的版本（稻草人谬误）。原文说"人是决定因素"不等于"只要有人民支持就必胜"，归谬前提本身是对原文的歪曲。'},
{id:199,cat:'综合',lv:3,type:'choice',stem:'【最终挑战】\n综合本套题目的训练，以下哪项最准确地描述了"论证结构识别""谬误辨别""概念把握"三种能力的内在关系？',opts:['A. 三者完全独立，分别训练即可','B. 概念把握是基础（确定术语的精确含义），谬误辨别是核心（识别逻辑错误），论证结构识别是整合（理解各部分如何服务于整体结论）——三者层层递进，相互依存','C. 论证结构最重要，其他两者是附属','D. 三者中谬误辨别最重要，其他两者可以忽略'],ans:'B',tag:'元认知：三种能力的关系',analysis:'在实际答题中：先要读懂概念→再识别谬误（判断选项是否对概念做了扭曲）→最终理解论证结构（判断论据与论点的关系）。三者形成底层→操作→整合的能力体系。'},
{id:200,cat:'综合',lv:3,type:'choice',stem:'【最终挑战】\n某考生完成了200道训练题后，总结说："做这类题的关键是：不要相信任何看起来合理的东西，要找到原文中的精确依据，并且检查选项与原文之间的每一个逻辑关系。"\n\n这个总结遗漏了什么关键要素？',opts:['A. 没有遗漏，总结完整','B. 遗漏了"理解谬误类型的名称"——知道谬误叫什么名字有助于快速定位错误','C. 遗漏了"识别论证意图"——不仅要查证原文字面，还要理解作者为何在此处使用这一论据，以判断选项是否误解了论证意图','D. 遗漏了阅读速度的训练'],ans:'C',tag:'元认知：综合能力总结',analysis:'该考生掌握了"原文比对"层面，但"论证意图识别"（论据为何在此、服务于哪个论点）是另一层面。很多错误选项对原文字面准确，但误解了论据在论证中的位置和目的，C指出了这一关键遗漏。'},
];

// ──────── 状态 ────────
const ST={cat:'all',lv:'all',done:'all',ans:{}};

function load(){try{const s=localStorage.getItem('lq200');if(s)ST.ans=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem('lq200',JSON.stringify(ST.ans));}catch(e){}}

// ──────── 筛选 ────────
function setCat(el,v){ST.cat=v;document.querySelectorAll('#fc .fbtn').forEach(b=>b.className='fbtn');el.className='fbtn on';render();}
function setLv(el,v){ST.lv=v;document.querySelectorAll('#fl .fbtn').forEach(b=>b.className='fbtn');el.className='fbtn on';render();}
function setDone(el,v){ST.done=v;document.querySelectorAll('#fd .fbtn').forEach(b=>{b.classList.remove('on','on-green','on-red');});if(v==='all')el.classList.add('on');else if(v==='undone')el.classList.add('on-green');else el.classList.add('on-red');render();}

function filtered(){
  return Q.filter(q=>{
    if(ST.cat!=='all'&&q.cat!==ST.cat)return false;
    if(ST.lv!=='all'&&q.lv!==parseInt(ST.lv))return false;
    const r=ST.ans[q.id];
    if(ST.done==='undone'&&r)return false;
    if(ST.done==='wrong'&&(!r||r.ok))return false;
    return true;
  });
}

// ──────── 统计 ────────
function updateStats(){
  const done=Object.keys(ST.ans).length;
  const right=Object.values(ST.ans).filter(a=>a.ok).length;
  const wrong=Object.values(ST.ans).filter(a=>!a.ok).length;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-right').textContent=right;
  document.getElementById('progress').style.width=(done/200*100).toFixed(1)+'%';
  const wb=document.getElementById('btn-wrong');
  document.getElementById('wrong-count').textContent=wrong;
  wb.style.display=wrong>0?'':'none';
}

// ──────── 作答 ────────
function answer(qid,chosen,correctAns){
  ST.ans[qid]={chosen,ok:chosen===correctAns};
  save();updateStats();renderCard(qid);
}

// ──────── 辅助 ────────
function catClass(c){return{A:'ba',B:'bb',C:'bc','综合':'bs'}[c]||'ba';}
function catLabel(c){return{A:'A 论证结构',B:'B 谬误识别',C:'C 概念把握','综合':'综合'}[c]||c;}
function lvClass(l){return{1:'lv1',2:'lv2',3:'lv3'}[l]||'lv1';}
function lvLabel(l){return{1:'基础',2:'进阶',3:'挑战'}[l]||'';}

// ──────── 渲染单卡 ────────
function renderCard(qid){
  const el=document.getElementById('c'+qid);
  if(!el)return;
  const q=Q.find(x=>x.id===qid);
  const r=ST.ans[qid];
  el.className='card'+(r?(r.ok?' ok':' ng'):'');
  const body=el.querySelector('.card-body');
  body.innerHTML='';

  if(q.type==='choice'){
    const wrap=document.createElement('div');wrap.className='opts';
    q.opts.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='opt';btn.textContent=opt;
      if(r){
        btn.classList.add('disabled');
        const letter=opt[0];
        if(letter===q.ans)btn.classList.add(r.chosen===q.ans&&r.chosen===letter?'correct':'show-ans');
        if(letter===r.chosen&&letter!==q.ans)btn.classList.add('wrong');
      }else{
        btn.addEventListener('click',()=>answer(qid,opt[0],q.ans));
      }
      wrap.appendChild(btn);
    });
    body.appendChild(wrap);
  }else{
    const wrap=document.createElement('div');wrap.className='jbtns';
    ['正确','错误'].forEach(v=>{
      const btn=document.createElement('button');
      btn.className='jbtn';btn.textContent=v;
      if(r){
        btn.classList.add('disabled');
        if(v===q.ans)btn.classList.add(r.chosen===q.ans&&r.chosen===v?'correct':'show-ans');
        if(v===r.chosen&&v!==q.ans)btn.classList.add('wrong');
      }else{
        btn.addEventListener('click',()=>answer(qid,v,q.ans));
      }
      wrap.appendChild(btn);
    });
    body.appendChild(wrap);
  }

  if(r){
    const an=document.createElement('div');
    an.className='analysis show';
    an.innerHTML='<span class="tag-badge">'+q.tag+'</span><br>'+q.analysis;
    body.appendChild(an);
  }
}

// ──────── 整体渲染 ────────
function render(){
  const list=document.getElementById('list');
  const qs=filtered();
  if(!qs.length){
    list.innerHTML='<div class="empty"><span>🔍</span>没有符合条件的题目</div>';
    updateStats();return;
  }
  const frag=document.createDocumentFragment();
  qs.forEach(q=>{
    const r=ST.ans[q.id];
    const card=document.createElement('div');
    card.className='card'+(r?(r.ok?' ok':' ng'):'');
    card.id='c'+q.id;
    card.innerHTML=
      '<div class="card-head">'+
        '<div class="meta">'+
          '<span class="qnum">第 '+q.id+' 题</span>'+
          '<span class="badge '+catClass(q.cat)+'">'+catLabel(q.cat)+'</span>'+
          '<span class="badge '+lvClass(q.lv)+'">'+lvLabel(q.lv)+'</span>'+
          '<span class="qtype-tag">'+( q.type==='judge'?'判断题':'单选题')+'</span>'+
        '</div>'+
        '<div class="stem">'+q.stem+'</div>'+
      '</div>'+
      '<div class="card-body"></div>';
    frag.appendChild(card);
  });
  list.innerHTML='';
  list.appendChild(frag);
  qs.forEach(q=>renderCard(q.id));
  updateStats();
}

// ──────── 跳转 ────────
function jumpTo(){
  const n=parseInt(document.getElementById('ji').value);
  if(!n||n<1||n>200){alert('请输入 1-200 之间的题号');return;}
  ST.cat='all';ST.lv='all';ST.done='all';
  document.querySelectorAll('#fc .fbtn').forEach((b,i)=>{b.className='fbtn'+(i===0?' on':'');});
  document.querySelectorAll('#fl .fbtn').forEach((b,i)=>{b.className='fbtn'+(i===0?' on':'');});
  document.querySelectorAll('#fd .fbtn').forEach((b,i)=>{b.className='fbtn'+(i===0?' on':'');});
  render();
  setTimeout(()=>{
    const el=document.getElementById('c'+n);
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },80);
}

// ──────── 重置 ────────
function resetAll(){
  if(!confirm('确认清除所有作答记录，重新开始？'))return;
  ST.ans={};save();render();
}

// ──────── 初始化 ────────
load();render();
</script>
