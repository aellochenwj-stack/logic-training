<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>高考小说术语·速记卡</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&family=ZCOOL+XiaoWei&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a1a;
    --paper:#f4ede0;
    --paper-dark:#e8dcc4;
    --red:#c0392b;
    --red-deep:#8b1e1e;
    --gold:#b8860b;
    --green:#4a6741;
    --blue-ink:#2c3e50;
    --muted:#7a6f5d;
    --line:#3a2e22;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Noto Serif SC",serif;
    min-height:100vh;
  }
  body{
    background-image:
      radial-gradient(circle at 20% 30%, rgba(184,134,11,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(192,57,43,0.03) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(58,46,34,0.015) 2px, rgba(58,46,34,0.015) 3px);
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  /* 顶部 */
  .top-bar{
    padding:14px 16px 10px;
    border-bottom:1.5px solid var(--line);
    background:var(--paper);
    flex-shrink:0;
    position:sticky;
    top:0;
    z-index:10;
  }
  .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .brand{font-family:"ZCOOL XiaoWei",serif;font-size:15px;letter-spacing:0.12em}
  .brand .accent{color:var(--red-deep)}
  .counter{
    font-family:"JetBrains Mono",monospace;font-size:13px;
    background:var(--paper-dark);padding:3px 10px;
    border:1px solid var(--line);letter-spacing:0.1em;
  }
  .counter .current{color:var(--red-deep);font-weight:700}
  .progress-bar{height:4px;background:var(--paper-dark);position:relative;border:1px solid var(--line)}
  .progress-fill{position:absolute;top:0;left:0;height:100%;background:var(--red);transition:width 0.3s}
  .progress-dots{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
  .dot{flex:1;min-width:4px;max-width:12px;height:3px;background:var(--paper-dark);border:0.5px solid var(--line);transition:all 0.2s}
  .dot.visited{background:var(--muted)}
  .dot.mastered{background:var(--red-deep)}
  .dot.current{background:var(--red);transform:scaleY(1.8)}

  /* 筛选栏 */
  .filter-bar{
    padding:8px 12px;display:flex;gap:6px;overflow-x:auto;
    background:var(--paper);border-bottom:1px solid var(--line);
    flex-shrink:0;scrollbar-width:none;
    position:sticky;top:75px;z-index:9;
  }
  .filter-bar::-webkit-scrollbar{display:none}
  .chip{
    padding:5px 12px;border:1px solid var(--line);background:transparent;
    font-family:"Noto Serif SC",serif;font-size:12px;cursor:pointer;
    color:var(--ink);white-space:nowrap;flex-shrink:0;transition:all 0.15s;
  }
  .chip.active{background:var(--red-deep);color:var(--paper);border-color:var(--red-deep)}
  .mode-btn{
    padding:5px 10px;background:var(--ink);color:var(--paper);border:none;
    font-family:"ZCOOL XiaoWei",serif;font-size:12px;cursor:pointer;
    letter-spacing:0.1em;white-space:nowrap;flex-shrink:0;
  }
  .mode-btn.shuffle-active{background:var(--gold)}
  .mode-btn.filter-mastered-active{background:var(--red-deep)}

  /* 卡片舞台 */
  .stage{
    flex:1;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:20px 16px;
    min-height:0;
  }
  .card-container{
    width:100%;
    max-width:440px;
    position:relative;
  }

  /* 单卡片 - 直接切换正反面内容,完全不依赖3D */
  .card{
    width:100%;
    background:var(--paper);
    border:1.5px solid var(--line);
    box-shadow:5px 5px 0 var(--line),10px 10px 24px rgba(0,0,0,0.15);
    padding:24px 22px;
    position:relative;
    transition:opacity 0.2s, transform 0.3s;
    min-height:60vh;
  }
  .card.is-back{
    background:var(--paper-dark);
  }
  .card.flipping-out{
    opacity:0;
    transform:scale(0.96);
  }
  .card.sliding-left{
    opacity:0;
    transform:translateX(-30px);
  }
  .card.sliding-right{
    opacity:0;
    transform:translateX(30px);
  }

  .mastered-stamp{
    position:absolute;top:-12px;right:-12px;width:54px;height:54px;
    background:var(--red);color:var(--paper);border-radius:50%;
    display:none;
    align-items:center;justify-content:center;
    font-family:"ZCOOL XiaoWei",serif;font-size:14px;
    transform:rotate(-12deg);box-shadow:2px 2px 8px rgba(0,0,0,0.3);
    z-index:10;letter-spacing:0.08em;border:2px solid var(--paper);
  }
  .card.mastered .mastered-stamp{display:flex}

  /* === 正面内容 === */
  .face-front{
    display:flex;
    flex-direction:column;
    min-height:55vh;
  }
  .card-index{
    font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);
    letter-spacing:0.15em;border-bottom:1px solid var(--line);
    padding-bottom:8px;display:flex;justify-content:space-between;align-items:center;
  }
  .category-tag{background:var(--ink);color:var(--paper);padding:3px 10px;font-size:11px;letter-spacing:0.1em}
  .category-tag.cat-叙事{background:var(--red-deep)}
  .category-tag.cat-情节{background:var(--blue-ink)}
  .category-tag.cat-环境{background:var(--green)}
  .category-tag.cat-人物{background:var(--gold)}
  .category-tag.cat-语言{background:#6b4423}
  .category-tag.cat-结构{background:#4a4a4a}

  .term-zh{
    font-family:"ZCOOL XiaoWei",serif;
    font-size:clamp(40px,11vw,60px);
    line-height:1.15;
    margin:auto 0;
    text-align:center;
    letter-spacing:0.05em;
    padding:30px 0;
  }
  .term-zh .underline{
    display:inline-block;padding:0 8px;border-bottom:4px solid var(--red);
  }

  .flip-hint{
    margin-top:auto;font-family:"JetBrains Mono",monospace;
    font-size:11px;color:var(--muted);text-align:center;
    letter-spacing:0.25em;opacity:0.7;padding-top:14px;
    border-top:1px dashed var(--muted);
  }
  .hint-icon{display:inline-block;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}

  /* === 背面内容 === */
  .face-back{
    display:flex;
    flex-direction:column;
  }
  .back-title{
    font-family:"ZCOOL XiaoWei",serif;font-size:24px;color:var(--red-deep);
    margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid var(--red);
    letter-spacing:0.05em;display:flex;justify-content:space-between;align-items:baseline;
  }
  .back-title-num{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:0.15em}

  .section{margin-bottom:16px}
  .section-label{
    font-family:"JetBrains Mono",monospace;font-size:10px;
    color:var(--muted);letter-spacing:0.25em;margin-bottom:6px;
    display:flex;align-items:center;gap:6px;
  }
  .section-label::after{content:"";flex:1;height:1px;background:var(--muted);opacity:0.3}
  .section-content{font-size:15px;line-height:1.7}

  .effects-list{list-style:none}
  .effects-list li{
    padding-left:18px;position:relative;margin-bottom:6px;
    font-size:14px;line-height:1.65;
  }
  .effects-list li::before{
    content:"※";position:absolute;left:0;color:var(--red);font-size:11px;top:3px;
  }
  .source{
    font-size:12.5px;color:var(--blue-ink);font-style:italic;
    padding:8px 10px;background:rgba(255,255,255,0.4);
    border-left:3px solid var(--blue-ink);line-height:1.55;
  }

  .back-flip-hint{
    margin-top:14px;padding-top:12px;
    border-top:1px dashed var(--muted);
    font-family:"JetBrains Mono",monospace;
    font-size:11px;color:var(--muted);text-align:center;
    letter-spacing:0.25em;opacity:0.7;
  }

  /* 底部 */
  .bottom-bar{
    padding:12px 16px 16px;background:var(--paper);
    border-top:1.5px solid var(--line);flex-shrink:0;
    display:flex;gap:8px;align-items:center;
    position:sticky;bottom:0;z-index:10;
  }
  .nav-btn{
    width:48px;height:48px;border:1.5px solid var(--line);
    background:var(--paper-dark);font-size:22px;cursor:pointer;
    font-family:"ZCOOL XiaoWei",serif;display:flex;
    align-items:center;justify-content:center;color:var(--ink);
    transition:all 0.15s;flex-shrink:0;
  }
  .nav-btn:active{background:var(--ink);color:var(--paper);transform:scale(0.95)}
  .nav-btn:disabled{opacity:0.3;cursor:not-allowed}
  .master-toggle{
    flex:1;height:48px;border:1.5px solid var(--line);
    background:var(--paper-dark);font-family:"ZCOOL XiaoWei",serif;
    font-size:15px;cursor:pointer;letter-spacing:0.15em;
    color:var(--ink);transition:all 0.15s;
  }
  .master-toggle:active{transform:scale(0.98)}
  .master-toggle.active{background:var(--red-deep);color:var(--paper);border-color:var(--red-deep)}

  .empty-state{
    text-align:center;padding:60px 20px;
    font-family:"ZCOOL XiaoWei",serif;color:var(--muted);
  }
  .empty-state h2{font-size:28px;margin-bottom:12px;color:var(--ink)}
  .empty-state p{font-size:15px;line-height:1.8}
  .empty-state button{
    margin-top:20px;padding:12px 28px;background:var(--red-deep);
    color:var(--paper);border:none;font-family:"ZCOOL XiaoWei",serif;
    font-size:15px;letter-spacing:0.15em;cursor:pointer;
  }

  .completion-banner{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:var(--ink);color:var(--paper);padding:40px 50px;
    z-index:100;text-align:center;border:3px double var(--gold);
    box-shadow:10px 10px 40px rgba(0,0,0,0.4);display:none;max-width:85%;
  }
  .completion-banner.show{display:block}
  .completion-banner h2{
    font-family:"ZCOOL XiaoWei",serif;font-size:28px;margin-bottom:8px;
    color:var(--gold);letter-spacing:0.15em;
  }
  .completion-banner p{font-size:14px;margin-bottom:20px;opacity:0.9;line-height:1.7}
  .completion-banner button{
    padding:10px 24px;background:var(--gold);color:var(--ink);border:none;
    font-family:"ZCOOL XiaoWei",serif;font-size:14px;letter-spacing:0.15em;
    cursor:pointer;margin:0 4px;
  }

  @media(min-width:768px){
    .term-zh{font-size:60px}
    .section-content{font-size:15.5px}
    .effects-list li{font-size:14.5px}
    .brand{font-size:17px}
    .card-container{max-width:520px}
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-row">
    <div class="brand">小说术语 <span class="accent">·</span> 速记卡</div>
    <div class="counter"><span class="current" id="currentNum">01</span> / <span id="totalNum">30</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-dots" id="progressDots"></div>
</div>

<div class="filter-bar">
  <button class="chip active" data-filter="all">全部</button>
  <button class="chip" data-filter="叙事">叙事</button>
  <button class="chip" data-filter="情节">情节</button>
  <button class="chip" data-filter="环境">环境</button>
  <button class="chip" data-filter="人物">人物</button>
  <button class="chip" data-filter="语言">语言</button>
  <button class="chip" data-filter="结构">结构</button>
  <button class="mode-btn" id="shuffleBtn">🔀 乱序</button>
  <button class="mode-btn" id="filterMasteredBtn">仅未掌握</button>
</div>

<div class="stage">
  <div class="card-container" id="cardContainer"></div>
</div>

<div class="bottom-bar">
  <button class="nav-btn" id="prevBtn" aria-label="上一张">‹</button>
  <button class="master-toggle" id="masterToggle">标 为 已 掌 握</button>
  <button class="nav-btn" id="nextBtn" aria-label="下一张">›</button>
</div>

<div class="completion-banner" id="completionBanner">
  <h2>恭 喜 完 成</h2>
  <p>你已浏览完本组所有卡片<br>建议明天再复习一遍巩固记忆</p>
  <button onclick="resetProgress()">再看一轮</button>
  <button onclick="closeBanner()">关闭</button>
</div>

<script>
const cards = [
  {id:1, cat:"叙事", term:"第一人称叙事", def:"以\"我\"的口吻讲述,\"我\"是故事中的参与者或见证者,视野受限于\"我\"的所见所感。", effects:["增强真实感与代入感,拉近与读者距离","便于抒发内心情感、呈现主观感受","视野受限制造悬念,留下想象空间","\"我\"作为旁观者可烘托/评价他人"], source:"2023·新Ⅰ卷《给儿子》以\"你会…\"\"你得…\"的第二人称与第一人称交织;2024·新Ⅰ卷《放牛记》第一人称自述"},
  {id:2, cat:"叙事", term:"第三人称叙事", def:"以全知或旁观者视角讲述,叙述者不在故事之中,可自由切换时空与人物内心。", effects:["叙述自由,便于宏观把握情节","可呈现多人物多场景","全知视角可深入任何人物内心","客观冷静,便于展开时代图景"], source:"2024·新Ⅱ卷《千里江山图》以全知视角展开爱情与革命双线"},
  {id:3, cat:"叙事", term:"限知视角", def:"叙述仅限于某一人物(常为主人公或儿童)的所知所感,超出其认知范围的信息不呈现。", effects:["制造信息差,营造悬念","增强代入感与真实性","通过认知局限反映人物性格/心智","引发读者主动填补空白"], source:"2021·新Ⅰ卷《石门阵》借王木匠讲述制造限知;儿童视角在童年回忆类文本高频"},
  {id:4, cat:"叙事", term:"儿童视角", def:"借儿童的眼光、语言、心理来叙述,呈现与成人不同的观察方式。", effects:["语言天真朴素,形成独特趣味","简化复杂事物,以纯真反衬成人世界","通过儿童的不解制造反讽","便于展现成长主题"], source:"2022·新Ⅱ卷《到橘子林去》以小岫视角展现童趣;2021·新Ⅱ卷教小孩子作文相关"},
  {id:5, cat:"叙事", term:"双线结构", def:"小说有两条并行或交织的叙事线索,可为明暗线、主副线,或人物A线/人物B线。", effects:["拓展叙事容量,丰富主题层次","两线互为映衬、对比或因果","明暗配合制造悬念与张力","将个人命运与时代背景交织"], source:"2024·新Ⅱ卷《千里江山图》D项\"个人爱情与革命斗争交融\"即双线"},
  {id:6, cat:"叙事", term:"时间标记", def:"在叙述中频繁插入\"一年以后\"\"现在想来\"\"他知道时\"等时间标示语,打破线性时序。", effects:["形成过去—现在—未来的时空交错","制造历史纵深感与回望视角","暗示结局,增强宿命感或思考意味","让叙事节奏张弛有度"], source:"2024·新Ⅱ卷《千里江山图》第9题直接考查此技巧"},
  {id:7, cat:"叙事", term:"倒叙", def:"将事件结局或关键片段提前,再回溯前因的叙述方式。", effects:["开篇即制造悬念,抓住读者","形成结构张力,引发追因心理","突出强调被提前的内容","便于聚焦主题情感"], source:"常见于小说开头的\"他死了\"\"多年以后…\"等句式"},
  {id:8, cat:"叙事", term:"插叙", def:"在主线叙事中暂时中断,插入与主线相关的往事或背景信息,再回到主线。", effects:["补充背景信息,丰满人物形象","解释事件因果,使情节完整","调节叙事节奏,避免平铺直叙","与主线形成对比或呼应"], source:"2023·全国乙卷《长出一地的好荞麦》插入德贵早年务农记忆"},
  {id:9, cat:"叙事", term:"补叙", def:"在故事主要情节结束后,对前文关键信息做补充说明。", effects:["解开前文悬念,使情节完整","推翻/深化读者原有认知,带来震撼","强化人物形象或主题","常与反转结尾配合使用"], source:"常见于悬疑类小说的结尾"},
  {id:10, cat:"情节", term:"伏笔", def:"对后文将出现的情节、人物在前文做隐蔽的预先提示或暗示。", effects:["使情节发展合乎逻辑,不显突兀","前后照应,结构严谨","读者回读时有\"原来如此\"的阅读快感","暗示主题或人物命运"], source:"2023·全国乙卷《长出一地的好荞麦》A项\"颗粒无收的事实…埋下了伏笔\""},
  {id:11, cat:"情节", term:"铺垫", def:"为后文情节高潮或人物行为提前做大量、显性的准备与酝酿。", effects:["使后文情节出现自然可信","强化情节高潮的冲击力","突出被铺垫对象的重要性","(与伏笔区别:铺垫显,伏笔隐)"], source:"小说开头的环境描写、人物出场前的氛围营造常为铺垫"},
  {id:12, cat:"情节", term:"反转", def:"在结尾处情节走向与前文铺垫方向相反,打破读者预期(又称欧·亨利式结尾)。", effects:["出人意料又在情理之中,强化戏剧性","深化或颠覆主题","引发读者对前文细节的重新审视","留下强烈阅读印象"], source:"《项链》《最后一片常春藤叶》为典型"},
  {id:13, cat:"情节", term:"开放式结尾", def:"故事结尾不给出明确结局,留下未解之谜或多种可能的走向。", effects:["留白引发联想,拓展想象空间","主题多解,增加思想深度","避免说教,让读者参与意义建构","余韵悠长,回味无穷"], source:"2023·全国乙卷《长出一地的好荞麦》以\"梦见好荞麦\"作开放/象征式收束"},
  {id:14, cat:"情节", term:"卒章显志", def:"在文章最后点明主旨或题目含义的写法。", effects:["主题升华,画龙点睛","照应题目,使结构圆合","在情感积蓄后迸发,冲击力强","便于读者把握创作意图"], source:"2024·甲卷结尾\"霜降后…一些人把双脚踩在了泥泞的路上\"即卒章显志"},
  {id:15, cat:"情节", term:"线索", def:"贯穿全文、串联情节或人物的核心事物、意象或人物关系。", effects:["结构作用:串联松散情节,使结构严谨","象征作用:成为主题/情感的载体","推动情节发展或引发矛盾","反复出现可形成回环呼应"], source:"2021·新Ⅰ卷《石门阵》\"门\"作为多层含义的线索(第9题)"},
  {id:16, cat:"环境", term:"自然环境描写", def:"对自然景物(山川、季节、天气、动植物等)的描写。", effects:["交代故事发生的时间、地点、背景","渲染氛围,奠定情感基调","烘托人物心理,暗示人物命运","推动情节(如雨夜引发冲突)","象征隐喻主题"], source:"2025·新Ⅰ卷《鼓书艺人》开篇长江描写;2024·甲卷霜降夜"},

];

const state = {
  currentFilter:'all', shuffled:false, filterMastered:false,
  mastered:new Set(), visited:new Set(), currentIndex:0,
  showBack: false  // false=正面, true=背面
};

try{
  const saved = localStorage.getItem('novelCardsStateV4');
  if(saved){
    const d = JSON.parse(saved);
    if(d.mastered) state.mastered = new Set(d.mastered);
    if(d.visited) state.visited = new Set(d.visited);
  }
}catch(e){}

function saveState(){
  try{
    localStorage.setItem('novelCardsStateV4', JSON.stringify({
      mastered:[...state.mastered], visited:[...state.visited]
    }));
  }catch(e){}
}

function getActiveCards(){
  let list = cards.filter(c => {
    if(state.currentFilter !== 'all' && c.cat !== state.currentFilter) return false;
    if(state.filterMastered && state.mastered.has(c.id)) return false;
    return true;
  });
  if(state.shuffled){
    list = [...list].sort((a,b) => ((a.id * 2654435761) % 1000) - ((b.id * 2654435761) % 1000));
  }
  return list;
}

const container = document.getElementById('cardContainer');
const currentNum = document.getElementById('currentNum');
const totalNum = document.getElementById('totalNum');
const progressFill = document.getElementById('progressFill');
const progressDots = document.getElementById('progressDots');
const masterToggle = document.getElementById('masterToggle');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function buildFrontHTML(c){
  return `
    <div class="face-front">
      <div class="card-index">
        <span>No.${String(c.id).padStart(2,'0')}</span>
        <span class="category-tag cat-${c.cat}">${c.cat}</span>
      </div>
      <div class="term-zh"><span class="underline">${c.term}</span></div>
      <div class="flip-hint"><span class="hint-icon">▼</span> 点 击 卡 片 查 看 释 义 <span class="hint-icon">▼</span></div>
    </div>
  `;
}

function buildBackHTML(c){
  return `
    <div class="face-back">
      <div class="back-title">
        <span>${c.term}</span>
        <span class="back-title-num">No.${String(c.id).padStart(2,'0')}</span>
      </div>
      <div class="section">
        <div class="section-label">定 义</div>
        <div class="section-content">${c.def}</div>
      </div>
      <div class="section">
        <div class="section-label">常 见 效 果</div>
        <ul class="effects-list">
          ${c.effects.map(e => `<li>${e}</li>`).join('')}
        </ul>
      </div>
      <div class="section">
        <div class="section-label">真 题 出 处</div>
        <div class="source">${c.source}</div>
      </div>
      <div class="back-flip-hint"><span class="hint-icon">▲</span> 点 击 返 回 正 面 <span class="hint-icon">▲</span></div>
    </div>
  `;
}

function render(){
  const active = getActiveCards();
  if(active.length === 0){
    container.innerHTML = `
      <div class="card">
        <div class="empty-state">
          <h2>— 无卡片 —</h2>
          <p>当前筛选下没有卡片<br>${state.filterMastered ? '你已掌握了本分类的所有卡片!' : '请尝试其他分类'}</p>
          <button onclick="resetFilters()">重置筛选</button>
        </div>
      </div>
    `;
    currentNum.textContent = '—';
    totalNum.textContent = '0';
    progressFill.style.width = '0%';
    progressDots.innerHTML = '';
    masterToggle.textContent = '—';
    masterToggle.disabled = true;
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }

  if(state.currentIndex >= active.length) state.currentIndex = 0;
  if(state.currentIndex < 0) state.currentIndex = active.length - 1;

  const c = active[state.currentIndex];
  state.visited.add(c.id);
  saveState();

  const isMastered = state.mastered.has(c.id);
  const cardClass = `card ${state.showBack ? 'is-back' : ''} ${isMastered ? 'mastered' : ''}`;
  const innerHTML = state.showBack ? buildBackHTML(c) : buildFrontHTML(c);

  container.innerHTML = `
    <div class="${cardClass}" id="theCard">
      <div class="mastered-stamp">已掌握</div>
      ${innerHTML}
    </div>
  `;

  // 绑定点击翻面
  const cardEl = document.getElementById('theCard');
  if(cardEl){
    cardEl.addEventListener('click', flipCard);
    attachSwipe(cardEl);
  }

  // 滚动到卡片顶部
  if(state.showBack){
    window.scrollTo({top:0, behavior:'auto'});
  }

  // 更新顶栏
  currentNum.textContent = String(state.currentIndex + 1).padStart(2,'0');
  totalNum.textContent = active.length;
  progressFill.style.width = `${((state.currentIndex + 1) / active.length) * 100}%`;
  progressDots.innerHTML = active.map((card, i) => {
    let cls = 'dot';
    if(i === state.currentIndex) cls += ' current';
    else if(state.mastered.has(card.id)) cls += ' mastered';
    else if(state.visited.has(card.id)) cls += ' visited';
    return `<div class="${cls}"></div>`;
  }).join('');

  masterToggle.textContent = isMastered ? '✓ 已 掌 握 (取 消)' : '标 为 已 掌 握';
  masterToggle.classList.toggle('active', isMastered);
  masterToggle.disabled = false;
  prevBtn.disabled = false;
  nextBtn.disabled = false;
}

function flipCard(){
  const cardEl = document.getElementById('theCard');
  if(!cardEl) return;
  cardEl.classList.add('flipping-out');
  setTimeout(() => {
    state.showBack = !state.showBack;
    render();
  }, 180);
}

function goNext(){
  const active = getActiveCards();
  if(state.currentIndex >= active.length - 1){
    checkCompletion();
    return;
  }
  const cardEl = document.getElementById('theCard');
  if(cardEl) cardEl.classList.add('sliding-left');
  setTimeout(() => {
    state.currentIndex++;
    state.showBack = false;
    render();
  }, 200);
}

function goPrev(){
  if(state.currentIndex <= 0) return;
  const cardEl = document.getElementById('theCard');
  if(cardEl) cardEl.classList.add('sliding-right');
  setTimeout(() => {
    state.currentIndex--;
    state.showBack = false;
    render();
  }, 200);
}

function attachSwipe(el){
  let startX=0, startY=0, currentX=0, currentY=0, isDragging=false, hasMoved=false;

  el.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    currentX = startX; currentY = startY;
    isDragging = true;
    hasMoved = false;
  }, {passive:true});

  el.addEventListener('touchmove', (e) => {
    if(!isDragging) return;
    const t = e.touches[0];
    currentX = t.clientX; currentY = t.clientY;
    if(Math.abs(currentX - startX) > 10 || Math.abs(currentY - startY) > 10) hasMoved = true;
  }, {passive:true});

  el.addEventListener('touchend', (e) => {
    if(!isDragging) return;
    isDragging = false;

    const dx = currentX - startX;
    const dy = currentY - startY;

    if(!hasMoved){
      // 点击 → 翻面 (由click事件处理,这里不重复)
      return;
    }

    // 阻止默认click(因为已经识别为滑动)
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)){
      e.preventDefault();
      // 用一个标记,告诉click事件不要触发
      el.dataset.justSwiped = 'true';
      setTimeout(() => { delete el.dataset.justSwiped; }, 300);
      if(dx > 0) goPrev(); else goNext();
    }
  });

  // click事件检查是否刚刚发生过滑动
  const originalClick = el.onclick;
  el.addEventListener('click', (e) => {
    if(el.dataset.justSwiped === 'true'){
      e.stopPropagation();
      e.preventDefault();
    }
  }, true);
}

function checkCompletion(){
  const active = getActiveCards();
  const visitedCount = active.filter(c => state.visited.has(c.id)).length;
  if(visitedCount === active.length){
    document.getElementById('completionBanner').classList.add('show');
  }
}

function closeBanner(){
  document.getElementById('completionBanner').classList.remove('show');
}

function resetProgress(){
  state.currentIndex = 0;
  state.showBack = false;
  closeBanner();
  render();
}

function resetFilters(){
  state.currentFilter = 'all';
  state.filterMastered = false;
  state.currentIndex = 0;
  state.showBack = false;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.chip[data-filter="all"]').classList.add('active');
  document.getElementById('filterMasteredBtn').classList.remove('filter-mastered-active');
  document.getElementById('filterMasteredBtn').textContent = '仅未掌握';
  render();
}

document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    state.currentFilter = c.dataset.filter;
    state.currentIndex = 0;
    state.showBack = false;
    render();
  });
});

document.getElementById('shuffleBtn').addEventListener('click', (e) => {
  state.shuffled = !state.shuffled;
  e.target.classList.toggle('shuffle-active', state.shuffled);
  state.currentIndex = 0;
  state.showBack = false;
  render();
});

document.getElementById('filterMasteredBtn').addEventListener('click', (e) => {
  state.filterMastered = !state.filterMastered;
  e.target.classList.toggle('filter-mastered-active', state.filterMastered);
  e.target.textContent = state.filterMastered ? '显示全部' : '仅未掌握';
  state.currentIndex = 0;
  state.showBack = false;
  render();
});

masterToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  const active = getActiveCards();
  if(active.length === 0) return;
  const c = active[state.currentIndex];
  if(state.mastered.has(c.id)) state.mastered.delete(c.id);
  else state.mastered.add(c.id);
  saveState();
  render();
});

prevBtn.addEventListener('click', (e) => { e.stopPropagation(); goPrev(); });
nextBtn.addEventListener('click', (e) => { e.stopPropagation(); goNext(); });

document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowLeft') goPrev();
  else if(e.key === 'ArrowRight') goNext();
  else if(e.key === ' ' || e.key === 'Enter'){ e.preventDefault(); flipCard(); }
});

render();
</script>
</body>
